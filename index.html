};

const _corrPt=(pct)=>{
    const t=Math.max(0,Math.min(1,pct/100));
    if(t<=0.5){const s=t*2,mt=1-s;return{x:mt*mt*52+2*mt*s*205+s*s*400,y:mt*mt*104+2*mt*s*66+s*s*104};}
    else{const s=(t-0.5)*2,mt=1-s;return{x:mt*mt*400+2*mt*s*595+s*s*748,y:mt*mt*104+2*mt*s*142+s*s*104};}
};
function corrLabelLines(title){
    const words=String(title||"STEP").toUpperCase().split(/\s+/).filter(Boolean);
    const lines=[];
    let line="";
    words.forEach(word=>{
        const next=line?line+" "+word:word;
        if(next.length>14&&line){lines.push(line);line=word;}
        else line=next;
    });
    if(line)lines.push(line);
    return lines.slice(0,3);
}
function corrNodePathPct(node,index,total){
    const clamp=v=>Math.max(0,Math.min(100,Number(v)||0));
    if(node.id===STATUS_START.id)return 0;
    if(node.id===STATUS_END.id)return 100;
    const scheduled=Number(node.scheduledAt);
    if(Number.isFinite(scheduled)&&scheduled>0)return clamp(scheduled);
    const progress=Number(node.progress);
    if(Number.isFinite(progress)&&progress>0&&progress<100)return clamp(progress);
    return total<=1?50:(index/(total-1))*100;
}

const SettlementCorridorSVG=({railNodes,displayProgress,displayTransferAmount,etaFormatted,currentStatus})=>{
    const visible=(railNodes||[]).filter(n=>n.visible);
    if(!displayTransferAmount||visible.length<1)return null;
    const PATH="M52,104 Q205,66 400,104 T748,104";
    const dp=Math.max(0,Math.min(100,displayProgress));
    const progressOffset=100-dp;
    const hops=Math.max(1,visible.filter(n=>n.id!==STATUS_START.id&&n.id!==STATUS_END.id).length+1);
    const etaStr=etaFormatted&&etaFormatted!=="—"&&etaFormatted!=="Step completed"?` · ETA ${etaFormatted}`:"";
    const activeTimer=!!currentStatus&&!currentStatus.stepCompleted&&(currentStatus.timerState==="running"||currentStatus.timerState==="completed");
    const incoming=(railNodes||[]).find(n=>n.scheduledAt>displayProgress&&n.scheduledAt-displayProgress<=0.85&&!n.stepCompleted&&!n.done);
    const pulse=(Math.sin(Date.now()/950)+1)/2;
    const integrity=activeTimer||incoming?0:(93+Math.round(pulse*60)/10);
    const latency=Math.round(28+hops*7+(activeTimer?18:0)+pulse*9);
    const nodePts=visible.map((n,i)=>{
        const pathPct=corrNodePathPct(n,i,visible.length);
        return{...n,pathPct,pos:_corrPt(pathPct)};
    });
    const vPacketPct=(()=>{
        if(visible.length<=1)return dp;
        const pts=visible.map((n,i)=>({
            dpv:corrNodePathPct(n,i,visible.length),
            vp:i/(visible.length-1)*100
        }));
        if(dp<=pts[0].dpv)return pts[0].vp;
        if(dp>=pts[pts.length-1].dpv)return pts[pts.length-1].vp;
        for(let j=0;j<pts.length-1;j++){
            const a=pts[j],b=pts[j+1];
            if(dp>=a.dpv&&dp<=b.dpv){
                const t=(b.dpv-a.dpv)>0?(dp-a.dpv)/(b.dpv-a.dpv):0;
                return a.vp+t*(b.vp-a.vp);
            }
        }
        return dp;
    })();
    return(
        <div className="corridor-card">
            <div className="corr-top-tag">SETTLEMENT CORRIDOR · LIVE</div>
            <div className="corr-inner">
                <div className="corr-head">
                    <div style={{minWidth:0,flex:1}}>
                        <div className="corr-title">Cross-Chain Settlement Path</div>
                        <div className="corr-sub">{`Routing $${Number(displayTransferAmount).toLocaleString()} across ${hops} validation station${hops!==1?"s":""}${etaStr}`}</div>
                        <div className="corr-pills">
                            <span className="corr-pill"><span className="corr-pill-lbl">Hops</span><b>{hops}</b></span>
                            <span className="corr-pill" style={{color:latency>65?"var(--amber)":"var(--green)"}}><span className="corr-pill-lbl">Lat</span><b>{latency}<span style={{opacity:.5}}>ms</span></b></span>
                            <span className="corr-pill" style={{color:integrity===0?"var(--red)":"var(--cyan)"}}><span className="corr-pill-lbl">Int</span><b>{integrity.toFixed(1)}<span style={{opacity:.5}}>%</span></b></span>
                        </div>
                    </div>
                    <div className="corr-stats">
                        <div className="corr-stat">
                            <div className="corr-stat-lbl">HOPS</div>
                            <div className="corr-stat-val" style={{color:"var(--text)"}}>{hops}</div>
                        </div>
                        <div className="corr-stat">
                            <div className="corr-stat-lbl">LATENCY</div>
                            <div className="corr-stat-val" style={{color:latency>65?"var(--amber)":"var(--green)"}}>{latency}<span style={{opacity:.5,fontSize:9}}>ms</span></div>
                        </div>
                        <div className="corr-stat">
                            <div className="corr-stat-lbl">INTEGRITY</div>
                            <div className="corr-stat-val" style={{color:integrity===0?"var(--red)":"var(--cyan)"}}>{integrity.toFixed(1)}<span style={{opacity:.5,fontSize:9}}>%</span></div>
                        </div>
                    </div>
                </div>

                <div className="corr-vertical">
                    <div className="corr-vline">
                        <div className="corr-vfill" style={{height:`${vPacketPct}%`}}/>
                    </div>
                    {dp>0&&dp<100&&<div className="corr-vpacket" style={{top:`${vPacketPct}%`}}/>}
                    {visible.map((node,i)=>{
                        const nodePct=corrNodePathPct(node,i,visible.length);
                        const cls=node.done?"done":node.active?"active":node.blocked?"blocked":node.stepStatus==="final"?"final":"dim";
                        const meta=node.done?"COMPLETE":node.active?"IN PROGRESS":node.blocked?"AWAITING":`SCHED ${node.scheduledAt||0}%`;
                        return(
                            <div key={node.id} className={`corr-vrow ${cls}`}>
                                <div className={`corr-vnode ${cls}`}>{node.done?"✓":i+1}</div>
                                <div className="corr-vinfo">
                                    <div className="corr-vtitle">{node.title||node.id}</div>
                                    <div className="corr-vmeta">{meta}</div>
                                </div>
                                <div className="corr-vpct">{Math.round(nodePct)}%</div>
                            </div>
                        );
                    })}
                </div>
                <div className="corr-svg-wrap">
                    <svg viewBox="0 0 800 220" preserveAspectRatio="xMidYMid meet"
                        style={{display:"block",width:"100%",minWidth:380,height:"clamp(136px,24vw,195px)"}}>
                        <defs>
                            <linearGradient id="corrGrad" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%" stopColor="#3ecf8e"/>
                                <stop offset="50%" stopColor="#2dd4bf"/>
                                <stop offset="100%" stopColor="#5b9cf6"/>
                            </linearGradient>
                        </defs>
                        <path d={PATH} stroke="rgba(45,212,191,.16)" strokeWidth="1.5" fill="none" strokeDasharray="3 7"/>
                        <path d={PATH} pathLength="100" stroke="url(#corrGrad)" strokeWidth="2.5" fill="none"
                            strokeDasharray="100" strokeDashoffset={progressOffset}
                            style={{filter:"drop-shadow(0 0 4px rgba(45,212,191,.55))"}}/>
                        {dp>0&&(
                            <circle r="4" fill="white"
                                style={{filter:"drop-shadow(0 0 7px #2dd4bf) drop-shadow(0 0 14px #2dd4bf)",
                                        offsetPath:`path('${PATH}')`,
                                        offsetDistance:`${dp}%`}}/>
                        )}
                        {dp>8&&(
                            <circle r="2.5" fill="#bef7ec" opacity="0.65"
                                style={{filter:"drop-shadow(0 0 5px #2dd4bf)",
                                        offsetPath:`path('${PATH}')`,
                                        offsetDistance:`${Math.max(0,dp-8)}%`}}/>
                        )}
                        {nodePts.map((node,i)=>{
                            const labelAbove=i%2===0;
                            const isDone=node.done;
                            const isActive=node.active;
                            const isBlocked=node.blocked;
                            const isFinal=node.stepStatus==="final";
                            const isAnchor=node.id===STATUS_START.id||node.id===STATUS_END.id;
                            const visualPct=(isActive&&!isDone)?Math.max(node.pathPct,dp):node.pathPct;
                            const pathPoint=_corrPt(visualPct);
                            const nodeOffset=isAnchor?0:(labelAbove?-42:42);
                            const x=pathPoint.x;
                            const isNextTarget=!isActive&&!isDone&&node.pathPct>dp&&
                                nodePts.slice(0,i).every(n=>n.done||n.active||n.pathPct<=dp);
                            const strokeCol=isDone?"#3ecf8e":isActive?"#2dd4bf":isBlocked?"#fbbf24":isFinal?"#f87171":"rgba(255,255,255,.2)";
                            const fillCol=isDone?"rgba(62,207,142,.12)":isActive?"rgba(45,212,191,.14)":"rgba(13,19,34,.98)";
                            const labelCol=isDone?"#3ecf8e":isActive?"#2dd4bf":"rgba(238,242,248,.5)";
                            const r=isAnchor?15:isActive?17:15;
                            const rawY=pathPoint.y+nodeOffset;
                            const y=isAnchor?pathPoint.y:(nodeOffset<0?Math.max(56,rawY):Math.min(150,rawY));
                            const textAbove=isAnchor||labelAbove;
                            const ly=textAbove?y-r-34:y+r+22;
                            const py=textAbove?y-r-8:y+r+45;
                            const ly1=pathPoint.y;
                            const ly2=nodeOffset<0?y+r+3:nodeOffset>0?y-r-3:y;
                            const labelLines=corrLabelLines(node.title||node.id||"");
                            return(
                                <g key={node.id}>
                                    {isNextTarget&&(
                                        <circle cx={x} cy={y} r={r+5} fill="none"
                                            stroke="rgba(45,212,191,.35)" strokeWidth="1.2"
                                            strokeDasharray="3 4"
                                            style={{animation:"corrRingSpin 1.2s linear infinite"}}/>
                                    )}
                                    {!isAnchor&&<line x1={x} y1={ly1} x2={x} y2={ly2} stroke={strokeCol} strokeWidth="1" opacity=".32"/>}
                                    <circle cx={x} cy={y} r={r} fill={fillCol} stroke={strokeCol} strokeWidth={isActive?"2":"1.5"}
                                        style={isActive?{filter:"drop-shadow(0 0 8px rgba(45,212,191,.75))"}:isDone?{filter:"drop-shadow(0 0 5px rgba(62,207,142,.5))"}:{}}/>
                                    {isDone&&<text x={x} y={y+3.5} textAnchor="middle" fill="#3ecf8e" fontSize="10" fontWeight="bold" fontFamily="'Geist Mono',monospace">✓</text>}
                                    {isActive&&!isDone&&(
                                        <circle cx={x} cy={y} r="3.5" fill="#2dd4bf" opacity=".9">
                                            <animate attributeName="r" values="3.5;5;3.5" dur="1.6s" repeatCount="indefinite"/>
                                            <animate attributeName="opacity" values=".9;.45;.9" dur="1.6s" repeatCount="indefinite"/>
                                        </circle>
                                    )}
                                    {labelLines.map((line,li)=>(
                                        <text key={li} x={x} y={ly+(li*8)} textAnchor="middle" fill={labelCol}
                                            fontSize="6.8" fontFamily="'Geist Mono',monospace" letterSpacing=".03em">{line}</text>
                                    ))}
                                    {node.scheduledAt>0&&(
                                        <text x={x} y={py} textAnchor="middle" fill="rgba(238,242,248,.28)"
                                            fontSize="7.5" fontFamily="'Geist Mono',monospace">{node.scheduledAt}%</text>
                                    )}
                                </g>
                            );
                        })}
                    </svg>
                </div>
            </div>
        </div>
    );
};

const App=()=>{
    const [booting,setBooting]=useState(true);
    const [session,setSession]=useState(null);
    const [loading,setLoading]=useState(false);
    const [error,setError]=useState("");

    const verify=async w=>{
        const wallet=normalizeWallet(w);
        if(!wallet)return{ok:false,error:"Enter the wallet address assigned to your cabinet."};
        const ws=await db.ref("wallet_index/"+wallet).once("value");
        const cid=ws.val();
        if(!cid)return{ok:false,error:"No cabinet is assigned to this wallet address."};
        const cs=await db.ref("cabinets/"+cid).once("value");
        const cab=cs.val();
        if(!cab||cab.allowed===false)return{ok:false,error:"This cabinet is not active yet. Contact support."};
        return{ok:true,cabinetId:cid,walletAddress:cab.walletAddress||w.trim()};
    };

    useEffect(()=>{
        let mounted=true;
        (async()=>{
            const ok=await ensureFirebase();
            if(!ok){if(mounted){setError(initError||"Connection error");setBooting(false);}return;}
            const cw=localStorage.getItem(STORAGE_KEYS.wallet);
            const cc=localStorage.getItem(STORAGE_KEYS.cabinet);
            if(cw&&cc){
                try{
                    const r=await verify(cw);
                    if(r.ok&&r.cabinetId===cc&&mounted)setSession({walletAddress:r.walletAddress,cabinetId:r.cabinetId});
                    else{localStorage.removeItem(STORAGE_KEYS.wallet);localStorage.removeItem(STORAGE_KEYS.cabinet);}
                }catch{localStorage.removeItem(STORAGE_KEYS.wallet);localStorage.removeItem(STORAGE_KEYS.cabinet);}
            }
            if(mounted)setBooting(false);
        })();
        return()=>{mounted=false;};
    },[]);

    const handleLogin=async w=>{
        setLoading(true);setError("");
        try{
            const r=await verify(w);
            if(!r.ok){setError(r.error);setLoading(false);return;}
            localStorage.setItem(STORAGE_KEYS.wallet,w.trim());
            localStorage.setItem(STORAGE_KEYS.cabinet,r.cabinetId);
            setSession({walletAddress:r.walletAddress,cabinetId:r.cabinetId});
        }catch{setError("Login failed. Please try again.");}
        setLoading(false);
    };

    const handleLogout=()=>{
        localStorage.removeItem(STORAGE_KEYS.wallet);
        localStorage.removeItem(STORAGE_KEYS.cabinet);
        setSession(null);
    };

    if(booting)return(<div className="login-shell"><div className="login-card" style={{textAlign:"center"}}><div className="login-logo mono" style={{margin:"0 auto 20px"}}>MP</div><div className="mono" style={{fontSize:12,color:"var(--cyan)"}}>Connecting…</div></div></div>);
    if(!session)return<LoginGate onLogin={handleLogin} loading={loading} error={error}/>;
    return<Dashboard session={session} onLogout={handleLogout}/>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
