<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>

    <style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600;700;800&display=swap');
:root{
    --bg:#060b14;--surface:rgba(10,16,28,0.94);--surface2:rgba(7,11,20,0.96);
    --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
    --cyan:#2dd4bf;--blue:#5b9cf6;--violet:#8b8ef8;--green:#3ecf8e;--red:#f87171;--amber:#fbbf24;
    --text:#eef2f8;--muted:rgba(238,242,248,0.55);--muted2:rgba(238,242,248,0.28);
    --popup-dur:.32s;--popup-exit:.24s;--popup-ease:cubic-bezier(.16,1,.3,1)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
button,a,[role="button"]{touch-action:manipulation}
.mono{font-family:'Geist Mono',monospace;letter-spacing:-.01em}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 0%,rgba(45,212,191,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 85% 100%,rgba(139,142,248,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
.glass{background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border)}
.glass2{background:var(--surface2);backdrop-filter:blur(20px);border:1px solid var(--border)}
.prog-wrap{position:relative}
.prog-track{width:100%;height:16px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;position:relative}
.prog-fill{height:100%;border-radius:999px;transition:width 120ms linear;position:relative;overflow:hidden;will-change:width}
.prog-fill.moving{background:linear-gradient(90deg,var(--cyan),var(--violet))}
.prog-fill.maintenance{background:linear-gradient(90deg,#78350f,#92400e,#b45309)}
.prog-fill.blocked{background:linear-gradient(90deg,var(--amber),#f59e0b)}
.prog-fill.error-fill{background:linear-gradient(90deg,var(--red),#f05656)}
.prog-fill.done-fill{background:linear-gradient(90deg,var(--green),#059669)}
.prog-fill.paused-visible{background:repeating-linear-gradient(45deg,rgba(148,163,184,.2) 0px,rgba(148,163,184,.2) 8px,rgba(148,163,184,.08) 8px,rgba(148,163,184,.08) 16px);border-right:2px solid rgba(148,163,184,.4)}
.prog-fill.paused-visible::after{display:none}
.prog-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:24px;background:rgba(255,255,255,.22);filter:blur(4px);pointer-events:none}
.maint-icons,.maint-icon,.prog-marker{display:none!important}
.prog-marker::after{display:none!important}
.status-rail{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.status-rail::-webkit-scrollbar{height:8px}
.status-rail::-webkit-scrollbar-track{background:rgba(255,255,255,.03);border-radius:999px}
.status-rail::-webkit-scrollbar-thumb{background:rgba(45,212,191,.28);border-radius:999px;border:2px solid rgba(6,11,20,1);background-clip:padding-box}
.status-rail::-webkit-scrollbar-thumb:hover{background:rgba(45,212,191,.5);background-clip:padding-box}
.status-node{min-width:136px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:transform .15s,border-color .15s,background .15s,box-shadow .15s;flex-shrink:0;position:relative}
.status-node:hover{transform:translateY(-1px);border-color:rgba(45,212,191,.18)}
.status-node.active{border-color:rgba(45,212,191,.3);background:rgba(45,212,191,.08)}
.status-node.done{border-color:rgba(62,207,142,.22);background:rgba(62,207,142,.06)}
.status-node.blocked-node{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)}
.status-node.final-node{min-width:160px;border:2px solid rgba(248,113,113,.4);box-shadow:0 0 12px rgba(248,113,113,.15);background:rgba(248,113,113,.06);animation:finalGlow 2s ease-in-out infinite}
.status-node.pre-final-node{min-width:160px;border:2px solid transparent;background:rgba(251,191,36,.06);background-clip:padding-box;position:relative}
.status-node.pre-final-node::before{content:'';position:absolute;inset:-2px;border-radius:14px;background:linear-gradient(135deg,rgba(251,191,36,.5),rgba(248,113,113,.3),rgba(251,191,36,.5));z-index:-1;animation:sweepBorder 3s linear infinite}
@keyframes finalGlow{0%,100%{box-shadow:0 0 8px rgba(248,113,113,.15)}50%{box-shadow:0 0 18px rgba(248,113,113,.3)}}
@keyframes sweepBorder{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.reversible-badge{position:absolute;bottom:5px;right:5px;font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700;font-family:'Geist Mono',monospace;pointer-events:none}
.reversible-badge.rev{background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.25);color:var(--green)}
.reversible-badge.norev{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.22);color:var(--red)}
.tab-btn{padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Instrument Sans',sans-serif}
.tab-btn.active{background:rgba(45,212,191,.1);border-color:rgba(45,212,191,.22);color:var(--cyan)}
.status-card{padding:14px;border-radius:14px;background:var(--surface2);border:1px solid var(--border)}
.requirement-box{padding:14px;border-radius:12px;border:1px solid rgba(251,191,36,.22);background:rgba(251,191,36,.05)}
.timeline{display:grid;gap:8px}
.timeline-item{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06)}
.login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 55% 45% at 50% 0%,rgba(45,212,191,.07),transparent 60%),var(--bg)}
.login-card{width:min(100%,440px);padding:36px;border-radius:24px;background:rgba(9,14,24,.96);border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(24px);box-shadow:0 28px 64px rgba(0,0,0,.42)}
.login-logo{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--cyan),#3b82f6);display:flex;align-items:center;justify-content:center;font-weight:800;color:#040e1a;font-size:14px;margin-bottom:22px;font-family:'Geist Mono',monospace}
.login-card h1{font-size:24px;font-weight:700;letter-spacing:-.025em;margin-bottom:8px}
.login-card p{color:var(--muted);line-height:1.65;font-size:13.5px;margin-bottom:26px}
.login-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:rgba(238,242,248,.35);margin-bottom:7px}
.login-field{width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);padding:12px 14px;color:var(--text);font-size:13.5px;outline:none;transition:border-color .18s,background .18s;font-family:'Geist Mono',monospace}
.login-field:focus{border-color:rgba(45,212,191,.3);background:rgba(255,255,255,.07)}
.login-field::placeholder{color:rgba(238,242,248,.25)}
.btn-main{width:100%;padding:13px;border-radius:12px;background:linear-gradient(145deg,var(--cyan),#3b9df5);color:#04111e;font-weight:700;border:none;cursor:pointer;transition:transform .15s,opacity .15s,box-shadow .15s;font-family:'Instrument Sans',sans-serif;font-size:14px;box-shadow:0 2px 14px rgba(45,212,191,.2)}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,212,191,.3)}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-success-main{background:linear-gradient(145deg,var(--green),#059669);color:#021a10}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);font-size:11px;font-weight:600}
.chip-cyan{border-color:rgba(45,212,191,.2);background:rgba(45,212,191,.07);color:var(--cyan)}
.chip-green{border-color:rgba(62,207,142,.2);background:rgba(62,207,142,.07);color:var(--green)}
.chip-amber{border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.07);color:var(--amber)}
.chip-red{border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.07);color:var(--red)}
.chip-muted{color:var(--muted)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green);box-shadow:0 0 5px rgba(62,207,142,.5)}
.dot-amber{background:var(--amber)}.dot-cyan{background:var(--cyan);box-shadow:0 0 5px rgba(45,212,191,.5)}
.empty-state{padding:24px;border-radius:12px;border:1px dashed rgba(255,255,255,.08);text-align:center;color:var(--muted);font-size:13px}
.stat-card{padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06)}
.stat-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(238,242,248,.35);margin-bottom:7px}
.stat-value{font-size:clamp(16px,2.5vw,22px);font-weight:700;font-family:'Geist Mono',monospace;letter-spacing:-.02em}
.stat-value.flash{color:var(--cyan)}
.section-head{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:rgba(238,242,248,.3);margin-bottom:10px}
.scanline-wrap{position:relative;overflow:hidden}
.scanline-wrap::after{content:'';position:absolute;left:0;right:0;top:-4px;height:2px;background:linear-gradient(90deg,transparent,rgba(45,212,191,.12),transparent);animation:scanline 3.5s linear infinite;pointer-events:none}
.chat-bubble-btn{position:fixed;bottom:26px;right:26px;width:62px;height:62px;border-radius:22px;background:linear-gradient(145deg,var(--cyan),#4d8df7 52%,var(--violet));border:1px solid rgba(255,255,255,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1000;color:#04111e;transition:transform .18s,filter .18s,box-shadow .18s;box-shadow:0 18px 36px rgba(0,0,0,.36),0 0 0 1px rgba(45,212,191,.18),0 0 34px rgba(45,212,191,.26)}
.chat-bubble-btn::before{content:'';position:absolute;inset:7px;border-radius:17px;background:linear-gradient(145deg,rgba(255,255,255,.34),transparent 46%);pointer-events:none}
.chat-bubble-btn:hover{transform:translateY(-2px) scale(1.03);filter:saturate(1.08)}
.chat-bubble-btn:active{transform:translateY(0) scale(.98)}
.chat-unread-badge{position:absolute;top:-5px;right:-5px;min-width:22px;height:22px;padding:0 6px;background:linear-gradient(135deg,var(--red),#fb923c);color:#fff;border:2px solid #08111f;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;box-shadow:0 8px 18px rgba(248,113,113,.34)}
.chat-window{position:fixed;bottom:100px;right:26px;width:min(420px,calc(100vw - 32px));height:min(640px,calc(100vh - 132px));height:min(640px,calc(100dvh - 132px));border-radius:28px;z-index:999;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 28px 80px rgba(0,0,0,.58),0 0 0 1px rgba(255,255,255,.08),0 0 48px rgba(45,212,191,.08);animation:chatPanelIn .28s cubic-bezier(.16,1,.3,1) both;isolation:isolate}
.chat-window::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 18% 0%,rgba(45,212,191,.16),transparent 34%),radial-gradient(circle at 92% 12%,rgba(91,156,246,.16),transparent 36%);pointer-events:none;z-index:0}
.chat-header{padding:17px 18px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(135deg,rgba(11,22,38,.94),rgba(8,15,28,.96));border-bottom:1px solid rgba(255,255,255,.07)}
.chat-header::before{content:'MP';width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),#3b82f6);color:#04111e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;font-family:'Geist Mono',monospace;box-shadow:0 8px 24px rgba(45,212,191,.2);flex-shrink:0}
.chat-agent{display:flex;align-items:center;gap:12px;min-width:0}
.chat-agent-avatar{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),#3b82f6);color:#04111e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;font-family:'Geist Mono',monospace;box-shadow:0 8px 24px rgba(45,212,191,.2);flex-shrink:0}
.chat-header-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-right:auto;display:flex;flex-direction:column;gap:3px}
.chat-header-title::after{content:'Online support';font-size:11px;font-weight:500;color:rgba(238,242,248,.58);letter-spacing:0}
.chat-agent-status{display:flex;align-items:center;gap:6px;margin-top:3px;font-size:11px;color:rgba(238,242,248,.58)}
.chat-agent-status span{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 9px rgba(62,207,142,.8)}
.chat-close-btn{width:36px;height:36px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;transition:background .14s,transform .14s;font-size:0;position:relative;flex-shrink:0}
.chat-close-btn::before,.chat-close-btn::after{content:'';position:absolute;width:14px;height:2px;border-radius:999px;background:#fff}
.chat-close-btn::before{transform:rotate(45deg)}
.chat-close-btn::after{transform:rotate(-45deg)}
.chat-close-btn:hover{background:rgba(255,255,255,.13);transform:translateY(-1px)}
.chat-messages{flex:1;min-height:0;overflow-y:auto;padding:18px 16px;background:linear-gradient(180deg,rgba(4,8,16,.95),rgba(3,6,12,.98));display:flex;flex-direction:column;gap:12px;scrollbar-gutter:stable;-webkit-overflow-scrolling:touch}
.chat-empty-state{margin:auto 0;padding:32px 18px;text-align:center;color:var(--muted);display:grid;place-items:center;gap:10px}
.chat-empty-orb{width:56px;height:56px;border-radius:20px;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.18);display:grid;place-items:center;color:var(--cyan)}
.chat-empty-title{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.chat-empty-copy{max-width:240px;font-size:12.5px;line-height:1.55;color:var(--muted)}
.chat-msg{display:flex;flex-direction:column;animation:msgIn .18s ease-out}
.chat-msg.admin{align-items:flex-start}.chat-msg.client{align-items:flex-end}
.chat-bubble-body{max-width:82%;padding:11px 13px;border-radius:18px;font-size:13.5px;word-break:break-word;line-height:1.48;box-shadow:0 8px 22px rgba(0,0,0,.16)}
.chat-msg.admin .chat-bubble-body{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-top-left-radius:6px;color:var(--text)}
.chat-msg.client .chat-bubble-body{background:linear-gradient(135deg,var(--cyan),#4d8df7);border:1px solid rgba(255,255,255,.18);border-top-right-radius:6px;color:#03101b;font-weight:650}
.chat-time{font-size:10px;color:var(--muted2);margin-top:5px;font-family:'Geist Mono',monospace}
.chat-input-area{padding:13px 14px 14px;background:rgba(4,8,16,.98);border-top:1px solid rgba(255,255,255,.07)}
.chat-header,.chat-messages,.chat-input-area{position:relative;z-index:1}
.chat-input-wrap{display:grid;grid-template-columns:minmax(0,1fr) 46px;gap:10px;align-items:end}
.chat-input{width:100%;min-height:46px;max-height:104px;resize:none;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:13px 14px;color:var(--text);font-size:14px;line-height:1.35;font-family:'Instrument Sans',sans-serif;outline:none;transition:border-color .15s,background .15s,box-shadow .15s;overflow-y:auto}
.chat-input-wrap>input.chat-input{display:none}
.chat-input:focus{border-color:rgba(45,212,191,.36);background:rgba(255,255,255,.085);box-shadow:0 0 0 3px rgba(45,212,191,.08)}
.chat-input::placeholder{color:rgba(238,242,248,.35)}
.chat-send-btn{background:linear-gradient(135deg,var(--cyan),#3b82f6);border:1px solid rgba(255,255,255,.14);width:46px;height:46px;border-radius:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#04111e;font-size:0;font-weight:800;box-shadow:0 10px 24px rgba(45,212,191,.22);transition:transform .14s,opacity .14s,box-shadow .14s;position:relative}
.chat-send-btn::before{content:'';width:13px;height:13px;border-top:2.5px solid #04111e;border-right:2.5px solid #04111e;transform:rotate(45deg) translate(-1px,1px);border-radius:1px}
.chat-send-btn:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(45,212,191,.3)}
.chat-send-btn:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none}
.dialog-wrap{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;animation:dialogOverlayIn var(--popup-dur) var(--popup-ease) forwards}
.dialog-wrap.is-closing{animation:dialogOverlayOut var(--popup-exit) ease forwards}
.dialog-card{position:relative;z-index:2;width:min(100%,480px);padding:28px;border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,.6);transform-origin:50% 54%;opacity:0;animation:dialogCardIn var(--popup-dur) var(--popup-ease) forwards}
.dialog-wrap.is-closing .dialog-card{animation:dialogCardOut var(--popup-exit) cubic-bezier(.4,0,.2,1) forwards}
.dialog-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);opacity:0;animation:dialogBackdropIn var(--popup-dur) ease forwards}
.dialog-wrap.is-closing .dialog-backdrop{animation:dialogBackdropOut var(--popup-exit) ease forwards}
.notif-popup{position:fixed;top:18px;right:18px;width:min(90vw,320px);z-index:40;border-radius:16px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.4);transform-origin:100% 0;opacity:0;animation:popupNoticeIn .28s var(--popup-ease) forwards}
.notif-popup.is-closing{animation:popupNoticeOut .2s ease forwards}
.wallet-input{width:100%;border-radius:10px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);padding:11px 12px;color:var(--text);font-size:12px;font-family:'Geist Mono',monospace;outline:none}
.copy-action-btn{white-space:nowrap}
.preserve-lines{white-space:pre-line}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(45,212,191,.2);border-radius:999px}
@keyframes confetti{0%{transform:translateY(-8px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(520deg);opacity:0}}
@keyframes travel{0%{left:-14px;opacity:0}12%{opacity:.75}88%{opacity:.75}100%{left:100%;opacity:0}}
@keyframes scanline{0%{transform:translateY(-4px);opacity:.5}100%{transform:translateY(100%);opacity:0}}
@keyframes chatPanelIn{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dialogOverlayIn{from{opacity:0}to{opacity:1}}
@keyframes dialogOverlayOut{from{opacity:1}to{opacity:0}}
@keyframes dialogBackdropIn{from{opacity:0}to{opacity:1}}
@keyframes dialogBackdropOut{from{opacity:1}to{opacity:0}}
@keyframes dialogCardIn{from{opacity:0;transform:translateY(22px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes dialogCardOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(16px) scale(.97)}}
@keyframes popupNoticeIn{from{opacity:0;transform:translateY(-14px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes popupNoticeOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-10px) scale(.96)}}
@keyframes markerPulse{0%,100%{opacity:1;box-shadow:0 0 6px rgba(251,191,36,.5)}50%{opacity:.6;box-shadow:0 0 12px rgba(251,191,36,.8)}}
@keyframes dotPulse{0%,100%{opacity:1;box-shadow:0 0 4px rgba(45,212,191,.6)}50%{opacity:.5;box-shadow:0 0 10px rgba(45,212,191,.9)}}
@keyframes deltaFade{0%{opacity:1;transform:translateY(0) scale(1)}40%{opacity:.95;transform:translateY(-8px) scale(1.05)}100%{opacity:0;transform:translateY(-22px) scale(.9)}}
.amount-delta-overlay{position:absolute;top:-4px;right:8px;font-family:'Geist Mono',monospace;font-size:14px;font-weight:700;color:var(--green);pointer-events:none;animation:deltaFade 3.2s ease-out forwards;white-space:nowrap;text-shadow:0 0 12px rgba(62,207,142,.6)}
@keyframes finalGlowPulse{0%,100%{box-shadow:0 0 8px rgba(248,113,113,.15)}50%{box-shadow:0 0 18px rgba(248,113,113,.3)}}
.status-node.active{border-color:rgba(45,212,191,.35)!important;background:rgba(45,212,191,.09)!important;box-shadow:0 0 14px rgba(45,212,191,.1)}
.dot-cyan.pulsing{animation:dotPulse 1.4s ease-in-out infinite}
@media(prefers-reduced-motion:reduce){
    .dialog-wrap,.dialog-card,.dialog-backdrop,.notif-popup,.chat-window,.chat-msg{animation:none!important;opacity:1!important;transform:none!important}
}
@media(max-width:760px){body.chat-lock{overflow:hidden}.chat-window{left:10px;right:10px;bottom:calc(82px + env(safe-area-inset-bottom));width:auto;height:70vh;height:min(70dvh,620px);border-radius:26px}.chat-bubble-btn{width:56px;height:56px;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));border-radius:20px}.notif-popup{top:12px;right:12px;width:calc(100vw - 24px)}}

    .glass,.glass2,.login-card,.corridor-card,.stat-card{backdrop-filter:none;-webkit-backdrop-filter:none;box-shadow:0 6px 18px rgba(0,0,0,.24)}
    .orbit,.particle,.travel-dot,.mesh-bg,.scanline,.skeleton::after{animation:none!important;display:none!important}
    .metric-fill,.prog-fill{transition:width .12s linear}
}


:root{
    --glow-cyan:0 0 22px rgba(45,212,191,.17);
    --glow-violet:0 0 22px rgba(139,142,248,.14);
    --glow-green:0 0 18px rgba(62,207,142,.16);
    --glow-amber:0 0 18px rgba(251,191,36,.16);
    --glow-red:0 0 18px rgba(248,113,113,.14);
    --t-fast:110ms cubic-bezier(.4,0,.2,1);
    --t-base:200ms cubic-bezier(.4,0,.2,1);
    --t-slow:360ms cubic-bezier(.4,0,.2,1);
    --highlight-line:inset 0 1px 0 rgba(255,255,255,.07);
    --card-shadow:0 6px 28px rgba(0,0,0,.32);
}


body::after{
    background:
        radial-gradient(ellipse 65% 45% at 12% 0%,rgba(45,212,191,.09) 0%,transparent 60%),
        radial-gradient(ellipse 55% 55% at 88% 100%,rgba(139,142,248,.07) 0%,transparent 60%),
        radial-gradient(ellipse 40% 30% at 55% 50%,rgba(91,156,246,.03) 0%,transparent 55%)
}


.glass{
    background:linear-gradient(160deg,rgba(13,19,34,.96),rgba(8,12,24,.97));
    box-shadow:var(--card-shadow),var(--highlight-line)
}
.glass2{
    background:linear-gradient(160deg,rgba(9,14,24,.97),rgba(6,10,20,.98));
    box-shadow:var(--card-shadow),var(--highlight-line)
}


.stat-card{
    background:linear-gradient(145deg,rgba(255,255,255,.032),rgba(255,255,255,.014));
    box-shadow:0 2px 14px rgba(0,0,0,.22),var(--highlight-line);
    transition:transform var(--t-base),box-shadow var(--t-base)
}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.28),var(--highlight-line)}


.stat-value,.mono{font-feature-settings:'tnum'}


.status-node{
    box-shadow:0 2px 8px rgba(0,0,0,.22);
    transition:transform var(--t-base),border-color var(--t-base),background var(--t-base),box-shadow var(--t-base)
}
.status-node:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.28),0 0 0 1px rgba(45,212,191,.1)}
.status-node.active{
    box-shadow:var(--glow-cyan),0 2px 14px rgba(0,0,0,.22),var(--highlight-line)!important;
    background:linear-gradient(145deg,rgba(45,212,191,.1),rgba(45,212,191,.06))!important
}
.status-node.done{box-shadow:0 0 14px rgba(62,207,142,.1),0 2px 8px rgba(0,0,0,.18)}
.status-node.blocked-node{box-shadow:0 0 12px rgba(251,191,36,.1),0 2px 8px rgba(0,0,0,.18)}


.prog-fill.moving{background:linear-gradient(90deg,var(--cyan),#5b9cf6,var(--violet));background-size:200% 100%;animation:barFlow 3s linear infinite}
.prog-fill.moving::before{content:'';position:absolute;top:0;bottom:0;left:-80px;width:80px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);animation:progShimmer 2.4s cubic-bezier(.4,0,.6,1) infinite}
@keyframes barFlow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes progShimmer{0%{left:-80px;opacity:0}20%{opacity:1}80%{opacity:1}100%{left:110%;opacity:0}}


.prog-track{box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}


.requirement-box{
    background:linear-gradient(145deg,rgba(251,191,36,.06),rgba(251,191,36,.03));
    box-shadow:0 2px 12px rgba(0,0,0,.18),inset 0 1px 0 rgba(251,191,36,.1)
}


.login-shell{position:relative;overflow:hidden}

.login-shell::before{
    content:'';position:absolute;inset:-10%;pointer-events:none;z-index:0;
    background:
        radial-gradient(ellipse 38% 30% at 22% 28%,rgba(45,212,191,.10),transparent 60%),
        radial-gradient(ellipse 32% 28% at 78% 18%,rgba(91,156,246,.08),transparent 60%),
        radial-gradient(ellipse 36% 30% at 75% 82%,rgba(62,207,142,.07),transparent 60%),
        radial-gradient(ellipse 30% 26% at 18% 78%,rgba(91,156,246,.05),transparent 60%);
    animation:loginMeshDrift 22s ease-in-out infinite alternate;
    filter:blur(8px);
}

.login-shell::after{
    content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);
    background-size:28px 28px;
    mask-image:radial-gradient(ellipse 80% 70% at 50% 50%,#000 40%,transparent 85%);
    -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 50%,#000 40%,transparent 85%);
}
@keyframes loginMeshDrift{
    0%{transform:translate(0,0) scale(1)}
    50%{transform:translate(-2%,1.5%) scale(1.04)}
    100%{transform:translate(1.8%,-1.2%) scale(1.02)}
}


.login-stack{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:14px;width:min(100%,460px)}


.login-card{
    background:linear-gradient(160deg,rgba(11,17,30,.97),rgba(7,11,22,.98));
    box-shadow:0 40px 90px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04),var(--highlight-line);
    width:100%;position:relative;overflow:hidden
}
.login-boot-card,.login-shell>.login-card{width:min(100%,360px);padding:34px 30px;border-radius:22px}

.login-card::before,.login-card::after{
    content:'';position:absolute;width:18px;height:18px;border:1px solid rgba(45,212,191,.32);pointer-events:none;
}
.login-card::before{top:14px;left:14px;border-right:none;border-bottom:none;border-top-left-radius:6px}
.login-card::after{bottom:14px;right:14px;border-left:none;border-top:none;border-bottom-right-radius:6px}

.login-card .login-accent{
    position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent 0%,rgba(45,212,191,0) 25%,rgba(45,212,191,.6) 50%,rgba(45,212,191,0) 75%,transparent 100%);
    background-size:200% 100%;
    animation:loginAccentSweep 6s linear infinite;
}
@keyframes loginAccentSweep{0%{background-position:100% 0}100%{background-position:-100% 0}}


.login-status{
    display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:22px;
    padding:8px 12px;border-radius:10px;
    background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);
    font-family:'Geist Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase
}
.login-status-item{display:flex;align-items:center;gap:6px;color:rgba(238,242,248,.45)}
.login-status-dot{width:6px;height:6px;border-radius:50%}
.login-status-dot.green{background:#3ecf8e;box-shadow:0 0 8px #3ecf8e;animation:dotBreath 2.4s ease-in-out infinite}
.login-status-dot.cyan{background:#2dd4bf;box-shadow:0 0 8px #2dd4bf;animation:dotBreath 2.6s ease-in-out infinite .3s}
.login-status-dot.amber{background:#fbbf24;box-shadow:0 0 8px #fbbf24}
.login-status-val{color:rgba(238,242,248,.78);font-weight:600}


.login-logo{position:relative;margin-bottom:18px}
.login-logo::before{
    content:'';position:absolute;inset:-7px;border-radius:18px;
    border:1px dashed rgba(45,212,191,.28);
    animation:logoRotate 14s linear infinite;
    pointer-events:none
}
.login-logo::after{
    content:'';position:absolute;inset:-12px;border-radius:22px;
    border:1px solid rgba(45,212,191,.10);
    pointer-events:none
}
@keyframes logoRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}


.login-field-wrap{position:relative;margin-bottom:14px}
.login-field{padding-right:42px}
.login-field:focus{border-color:rgba(45,212,191,.35);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(45,212,191,.08),0 0 16px rgba(45,212,191,.06)}
.login-field-icon{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;color:rgba(45,212,191,.6);pointer-events:none;
    transition:color .2s
}
.login-field:focus ~ .login-field-icon{color:rgba(45,212,191,1)}
.login-field-valid{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    color:#3ecf8e;font-size:14px;pointer-events:none;
    opacity:0;transition:opacity .2s
}
.login-field-wrap.valid .login-field-valid{opacity:1}
.login-field-wrap.valid .login-field-icon{opacity:0}


.login-handshake{
    margin:18px 0 22px;padding:14px 12px;
    border-radius:12px;
    background:linear-gradient(150deg,rgba(45,212,191,.04),rgba(91,156,246,.025));
    border:1px solid rgba(45,212,191,.08);
    position:relative;overflow:hidden
}
.login-handshake-label{
    font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    color:rgba(238,242,248,.32);margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center
}
.login-handshake-eta{color:rgba(45,212,191,.6)}


.login-footer{
    display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px;
    padding-top:16px;border-top:1px solid rgba(255,255,255,.05);
    font-family:'Geist Mono',monospace;font-size:9.5px;letter-spacing:.06em;
    color:rgba(238,242,248,.32)
}
.login-footer-chain{display:flex;align-items:center;gap:8px}
.login-footer-chain svg{color:rgba(45,212,191,.5)}
.login-footer-eth{display:flex;align-items:center;gap:6px;color:rgba(238,242,248,.55)}
.login-footer-eth strong{color:#fff;font-weight:600}


.login-meta-row{
    display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
    font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    color:rgba(238,242,248,.4)
}
.login-meta-chip{
    display:flex;align-items:center;gap:6px;
    padding:6px 12px;border-radius:999px;
    background:rgba(11,17,30,.6);border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(8px)
}


.login-spinner{
    display:inline-block;width:12px;height:12px;border-radius:50%;
    border:1.5px solid rgba(4,17,30,.3);border-top-color:#04111e;
    animation:loginSpin .7s linear infinite;margin-right:8px;vertical-align:-2px
}
@keyframes loginSpin{to{transform:rotate(360deg)}}


.btn-main{position:relative;overflow:hidden;box-shadow:0 3px 18px rgba(45,212,191,.22),var(--highlight-line)}
.btn-main::before{content:'';position:absolute;top:0;left:-100%;bottom:0;width:55%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);transition:left .55s cubic-bezier(.4,0,.2,1);pointer-events:none}
.btn-main:hover{box-shadow:0 6px 26px rgba(45,212,191,.32);transform:translateY(-1px)}
.btn-main:hover::before{left:130%}
.btn-success-main{box-shadow:0 3px 18px rgba(62,207,142,.2),var(--highlight-line)}
.btn-success-main:hover{box-shadow:0 6px 24px rgba(62,207,142,.3)}


.chip-cyan{background:linear-gradient(135deg,rgba(45,212,191,.11),rgba(45,212,191,.06))}
.chip-green{background:linear-gradient(135deg,rgba(62,207,142,.11),rgba(62,207,142,.06))}
.chip-amber{background:linear-gradient(135deg,rgba(251,191,36,.11),rgba(251,191,36,.06))}
.chip-red{background:linear-gradient(135deg,rgba(248,113,113,.11),rgba(248,113,113,.06))}


.dot-green{animation:dotBreath 2.8s ease-in-out infinite}
.dot-cyan{animation:dotBreath 2.4s ease-in-out infinite}
@keyframes dotBreath{0%,100%{box-shadow:0 0 4px currentColor}50%{box-shadow:0 0 10px currentColor,0 0 18px currentColor}}


.tab-btn{transition:background var(--t-fast),border-color var(--t-fast),color var(--t-fast),box-shadow var(--t-fast)}
.tab-btn.active{box-shadow:0 0 12px rgba(45,212,191,.12)}


.timeline-item{transition:border-color var(--t-fast),background var(--t-fast)}
.timeline-item:hover{border-color:rgba(45,212,191,.16);background:rgba(45,212,191,.03)}


.status-card{
    background:linear-gradient(145deg,rgba(8,12,22,.97),rgba(6,9,18,.98));
    box-shadow:0 4px 20px rgba(0,0,0,.28),var(--highlight-line)
}


.chat-bubble-btn{animation:chatRing 3.4s ease-out infinite}
@keyframes chatRing{0%,72%{box-shadow:0 18px 36px rgba(0,0,0,.36),0 0 0 1px rgba(45,212,191,.18),0 0 34px rgba(45,212,191,.26),0 0 0 0 rgba(45,212,191,.28)}78%{box-shadow:0 18px 36px rgba(0,0,0,.36),0 0 0 1px rgba(45,212,191,.18),0 0 34px rgba(45,212,191,.26),0 0 0 12px rgba(45,212,191,0)}100%{box-shadow:0 18px 36px rgba(0,0,0,.36),0 0 0 1px rgba(45,212,191,.18),0 0 34px rgba(45,212,191,.26),0 0 0 0 rgba(45,212,191,0)}}


.chat-send-btn{transition:transform .14s,opacity .14s,box-shadow .14s}
.chat-send-btn:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(45,212,191,.3)}


.amount-delta-overlay{text-shadow:0 0 16px rgba(62,207,142,.7),0 0 32px rgba(62,207,142,.4)}


.notif-popup{box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06)}


.dialog-card{box-shadow:0 32px 80px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.06),var(--highlight-line)}


.empty-state{border-color:rgba(45,212,191,.08);background:rgba(45,212,191,.015)}


.corridor-card{
    position:relative;overflow:hidden;border-radius:20px;margin-bottom:12px;
    background:
        radial-gradient(ellipse 80% 60% at 50% 0%,rgba(45,212,191,.09) 0%,transparent 60%),
        linear-gradient(165deg,rgba(13,19,34,.98),rgba(6,10,20,.99));
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 0 1px rgba(45,212,191,.06),inset 0 1px 0 rgba(255,255,255,.07)
}
.corridor-card::before{
    content:'';position:absolute;inset:0;
    background-image:linear-gradient(rgba(45,212,191,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,.04) 1px,transparent 1px);
    background-size:32px 32px;
    mask-image:radial-gradient(ellipse 60% 80% at 50% 50%,#000 30%,transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse 60% 80% at 50% 50%,#000 30%,transparent 80%);
    pointer-events:none
}
.corr-inner{padding:clamp(14px,3vw,20px);position:relative;z-index:1}
.corr-top-tag{
    position:absolute;left:clamp(12px,3vw,18px);top:clamp(12px,3vw,16px);
    font-size:9px;letter-spacing:.12em;text-transform:uppercase;
    color:rgba(238,242,248,.28);font-family:'Geist Mono',monospace;white-space:nowrap
}
.corr-head{
    display:flex;justify-content:space-between;align-items:flex-end;
    margin-top:22px;margin-bottom:8px;gap:10px;flex-wrap:wrap
}
.corr-title{font-size:clamp(14px,2.5vw,17px);font-weight:800;letter-spacing:-.025em;line-height:1.2}
.corr-sub{font-size:clamp(10px,1.5vw,11.5px);color:var(--muted);margin-top:3px;line-height:1.5}
.corr-stats{display:flex;gap:14px;font-family:'Geist Mono',monospace;flex-shrink:0}
.corr-stat{text-align:right}
.corr-stat-lbl{font-size:8.5px;letter-spacing:.1em;color:var(--muted2);margin-bottom:2px;text-transform:uppercase}
.corr-stat-val{font-size:13px;font-weight:700;line-height:1}


.corr-svg-wrap{
    overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
    scroll-behavior:smooth;padding-bottom:2px;
    scrollbar-width:thin;scrollbar-color:rgba(45,212,191,.25) transparent
}
.corr-svg-wrap::-webkit-scrollbar{height:3px}
.corr-svg-wrap::-webkit-scrollbar-thumb{background:rgba(45,212,191,.25);border-radius:999px}


@media(max-width:520px){
    .corr-title{font-size:14px}
    .corr-head{margin-top:18px}
}


.corr-svg-wrap{display:block}
.corr-vertical{display:none}
@media(max-width:640px){
    .corr-svg-wrap{display:none}
    .corr-vertical{display:block}
    .corr-stats{display:none}
    .corr-pills{display:flex}
}


@media(max-width:480px){
    .login-card{padding:24px 22px;border-radius:20px}
    .login-card h1{font-size:21px}
    .login-stack{gap:10px}
    .screen-nav{top:8px;right:8px;transform:scale(.85);transform-origin:top right}
}


.corr-pills{display:none;gap:6px;margin-top:8px;flex-wrap:wrap;font-family:'Geist Mono',monospace}
.corr-pill{
    display:inline-flex;align-items:center;gap:5px;
    padding:4px 9px;border-radius:999px;font-size:9.5px;letter-spacing:.06em;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
    color:rgba(238,242,248,.78)
}
.corr-pill b{font-weight:700;letter-spacing:0}
.corr-pill .corr-pill-lbl{color:var(--muted2);text-transform:uppercase;font-size:8.5px}


.corr-vertical{position:relative;margin-top:14px}
.corr-vline{
    position:absolute;left:8px;top:14px;bottom:14px;width:2px;
    background:linear-gradient(180deg,
        rgba(45,212,191,.12) 0%,
        rgba(45,212,191,.22) 50%,
        rgba(91,156,246,.12) 100%);
    border-radius:2px;overflow:visible
}

.corr-vfill{
    position:absolute;left:0;right:0;top:0;
    background:linear-gradient(180deg,#3ecf8e 0%,#2dd4bf 60%,#5b9cf6 100%);
    border-radius:2px;
    box-shadow:0 0 8px rgba(45,212,191,.55);
    transition:height 120ms linear;will-change:height
}

.corr-vpacket{
    position:absolute;left:50%;width:8px;height:8px;border-radius:50%;
    background:#fff;transform:translate(-50%,-50%);
    box-shadow:0 0 6px #2dd4bf,0 0 14px #2dd4bf;
    transition:top 120ms linear;z-index:2;will-change:top
}
.corr-vrow{
    position:relative;display:grid;grid-template-columns:42px 1fr auto;align-items:center;
    gap:10px;padding:8px 0;min-height:42px
}
.corr-vrow::before{
    content:'';position:absolute;left:9px;top:50%;width:14px;height:1px;
    background:linear-gradient(90deg,rgba(45,212,191,.28),rgba(45,212,191,.04));
    transform:translateY(-50%);z-index:0;pointer-events:none
}
.corr-vnode{
    position:relative;width:26px;height:26px;border-radius:50%;
    margin-left:12px;background:rgba(13,19,34,.98);
    border:1.5px solid rgba(255,255,255,.18);
    display:grid;place-items:center;
    font-family:'Geist Mono',monospace;font-size:10px;font-weight:700;
    color:rgba(238,242,248,.4);z-index:1;
    transition:transform .3s ease
}
.corr-vnode.done{
    border-color:#3ecf8e;color:#3ecf8e;
    background:rgba(62,207,142,.12);
    box-shadow:0 0 6px rgba(62,207,142,.4)
}
.corr-vnode.active{
    border-color:#2dd4bf;color:#2dd4bf;border-width:2px;
    background:rgba(45,212,191,.14);
    box-shadow:0 0 10px rgba(45,212,191,.55);
    transform:scale(1.1)
}
.corr-vnode.active::after{
    content:'';position:absolute;inset:-5px;border-radius:50%;
    border:1px solid rgba(45,212,191,.4);
    animation:ringPulse 2.8s ease-out infinite
}
.corr-vnode.blocked{border-color:#fbbf24;color:#fbbf24}
.corr-vnode.final{border-color:#f87171;color:#f87171}
.corr-vinfo{min-width:0}
.corr-vtitle{
    font-size:12px;font-weight:600;letter-spacing:-.01em;line-height:1.25;
    color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.corr-vrow.active .corr-vtitle{color:var(--cyan)}
.corr-vrow.done .corr-vtitle{color:#cfe9d8}
.corr-vrow.dim .corr-vtitle{color:rgba(238,242,248,.5)}
.corr-vmeta{
    font-size:9.5px;color:var(--muted2);
    font-family:'Geist Mono',monospace;letter-spacing:.04em;
    margin-top:2px;text-transform:uppercase
}
.corr-vpct{
    font-family:'Geist Mono',monospace;font-size:10px;
    color:rgba(238,242,248,.36);letter-spacing:.02em;
    padding-left:6px
}
.corr-vrow.done .corr-vpct{color:#3ecf8e}
.corr-vrow.active .corr-vpct{color:#2dd4bf}


.stats-4{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
@media(max-width:640px){.stats-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:360px){.stats-4{grid-template-columns:1fr}}


.bottom-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:10px}
@media(max-width:700px){.bottom-grid{grid-template-columns:1fr}}


@media(max-width:480px){
    .status-node{min-width:118px;padding:10px 11px}
    .status-rail{gap:8px}
    .prog-track{height:14px}
}


.stat-card{position:relative;overflow:hidden}
.stat-card::after{
    content:'';position:absolute;left:0;top:14%;bottom:14%;width:2px;border-radius:0 2px 2px 0;
    background:linear-gradient(180deg,transparent,var(--amber),transparent);opacity:.52
}
.stats-4 .stat-card:nth-child(2)::after{background:linear-gradient(180deg,transparent,var(--cyan),transparent)}
.stats-4 .stat-card:nth-child(3)::after{background:linear-gradient(180deg,transparent,var(--green),transparent)}


.status-node.active::after{
    content:'';position:absolute;inset:-4px;border-radius:16px;
    border:1px solid rgba(45,212,191,.28);
    animation:ringPulse 3s ease-out infinite;pointer-events:none;z-index:0
}
@keyframes ringPulse{0%{opacity:.7;transform:scale(.96)}100%{opacity:0;transform:scale(1.08)}}


.status-node.active .node-icon{
    background:linear-gradient(135deg,rgba(45,212,191,.22),rgba(91,156,246,.18))!important;
    box-shadow:inset 0 0 0 1px rgba(45,212,191,.35),0 0 12px rgba(45,212,191,.22);
    color:var(--cyan)!important
}


.status-node.active .node-sub::after{
    content:'_';margin-left:2px;
    animation:cursorBlink 1.4s steps(1) infinite;color:var(--cyan)
}
@keyframes cursorBlink{50%{opacity:0}}


.stat-spark{position:absolute;right:9px;bottom:9px;width:50px;height:17px;opacity:.48;pointer-events:none}


.prog-batt-wrap{display:block}
@media(max-width:600px){.prog-batt-wrap{grid-template-columns:1fr}}
.eth-battery{position:relative;border-radius:14px;padding:14px;
    background:linear-gradient(180deg,rgba(15,22,36,.75),rgba(6,11,20,.95));
    border:1px solid rgba(255,255,255,.08);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 8px 24px rgba(0,0,0,.4)}
.transfer-gas{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.07)}
.transfer-gas .eth-battery{padding:12px;border-radius:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 6px 18px rgba(0,0,0,.32)}
@media(max-width:600px){.eth-battery{display:block}}
.eth-glyph{width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#7b8aff,#3b4eb8);
    color:#fff;display:grid;place-items:center;flex-shrink:0;
    box-shadow:0 0 10px rgba(123,138,255,.5),inset 0 1px 0 rgba(255,255,255,.3);
    animation:ethBob 3s ease-in-out infinite}
.eth-glyph svg{width:15px;height:20px;display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.22))}
@keyframes ethBob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-2px) rotate(4deg)}}
.batt-cell{position:relative;height:92px;border-radius:10px;
    background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,.8));
    border:1px solid rgba(255,255,255,.1);overflow:hidden;
    box-shadow:inset 0 0 12px rgba(0,0,0,.6)}
.batt-cell::before{content:'';position:absolute;left:50%;top:-5px;width:30px;height:5px;
    background:rgba(255,255,255,.12);border-radius:2px 2px 0 0;transform:translateX(-50%)}
.batt-fill{position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(180deg,#7b8aff 0%,#5b9cf6 35%,#2dd4bf 100%);
    transition:height 1.2s cubic-bezier(.22,.61,.36,1);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 0 18px rgba(91,156,246,.4)}
.batt-fill.warn{background:linear-gradient(180deg,rgba(251,191,36,.9),rgba(251,191,36,.5));box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 0 10px rgba(251,191,36,.5)}
.batt-fill.crit{background:linear-gradient(180deg,rgba(248,113,113,.9),rgba(248,113,113,.5));box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 0 10px rgba(248,113,113,.5)}
.batt-fill::before{content:'';position:absolute;left:0;right:0;top:-3px;height:6px;
    background:rgba(255,255,255,.5);border-radius:50%;filter:blur(2px);
    animation:battSurface 3s ease-in-out infinite}
@keyframes battSurface{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-1px) scaleX(.97)}}
.batt-fill::after{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(45deg,transparent 0 6px,rgba(255,255,255,.06) 6px 12px);
    animation:battShimmer 4s linear infinite}
@keyframes battShimmer{from{background-position:0 0}to{background-position:24px 0}}
.batt-bubbles{position:absolute;inset:0;pointer-events:none}
.batt-bubbles span{position:absolute;bottom:-6px;width:5px;height:5px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.9),rgba(255,255,255,.2));
    animation:battBub 4s linear infinite}
.batt-bubbles span:nth-child(1){left:18%;animation-duration:4.2s}
.batt-bubbles span:nth-child(2){left:35%;animation-duration:5s;animation-delay:1.1s;width:3px;height:3px}
.batt-bubbles span:nth-child(3){left:55%;animation-duration:3.6s;animation-delay:.4s}
.batt-bubbles span:nth-child(4){left:72%;animation-duration:4.8s;animation-delay:2.2s;width:4px;height:4px}
.batt-bubbles span:nth-child(5){left:88%;animation-duration:5.4s;animation-delay:.8s;width:3px;height:3px}
@keyframes battBub{0%{bottom:-6px;opacity:0}10%{opacity:.9}90%{opacity:.6}100%{bottom:105%;opacity:0}}
.batt-tickmarks{position:absolute;right:5px;top:6px;bottom:6px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.batt-tickmarks i{display:block;width:6px;height:1px;background:rgba(255,255,255,.25)}
.batt-tickmarks i:nth-child(odd){width:9px}
.batt-shine{position:absolute;left:6px;top:0;bottom:0;width:8px;border-radius:4px;
    background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 60%);pointer-events:none}
.step-anim{display:inline-grid;place-items:center;width:1.45em;height:1.45em;line-height:1;transform-origin:50% 50%;will-change:transform,filter,opacity}
.step-anim-spark,.step-anim-compass{animation:iconPulse 2s ease-in-out infinite}
.step-anim-bridge,.step-anim-relay{animation:iconSlide 1.8s ease-in-out infinite}
.step-anim-graph,.step-anim-signal{animation:iconBars 1.6s ease-in-out infinite}
.step-anim-docs,.step-anim-scan,.step-anim-eye{animation:iconScan 2s linear infinite}
.step-anim-check,.step-anim-shield,.step-anim-lock,.step-anim-vault{animation:iconSecure 2.4s ease-in-out infinite}
.step-anim-dust,.step-anim-wave{animation:iconDrift 2.2s ease-in-out infinite}
.step-anim-hammer,.step-anim-gears{animation:iconWork 1.4s ease-in-out infinite}
.step-anim-key,.step-anim-chain,.step-anim-node{animation:iconTwist 2.6s ease-in-out infinite}
.step-anim-star,.step-anim-crystal,.step-anim-prism,.step-anim-hex{animation:iconShine 2.1s ease-in-out infinite}
.step-anim-bolt,.step-anim-zap,.step-anim-flame{animation:iconFlash 1.45s ease-in-out infinite}
.step-anim-globe,.step-anim-orbit,.step-anim-atom{animation:iconOrbit 2.8s linear infinite}
@keyframes iconPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(45,212,191,0))}50%{transform:scale(1.16);filter:drop-shadow(0 0 8px rgba(45,212,191,.55))}}
@keyframes iconSlide{0%,100%{transform:translateX(-1px)}50%{transform:translateX(2px)}}
@keyframes iconBars{0%,100%{transform:scaleY(.82)}50%{transform:scaleY(1.12)}}
@keyframes iconScan{0%,100%{filter:brightness(.8)}50%{filter:brightness(1.55) drop-shadow(0 0 7px rgba(91,156,246,.45))}}
@keyframes iconSecure{0%,100%{transform:scale(1)}50%{transform:scale(.92)}}
@keyframes iconDrift{0%,100%{transform:translateY(1px) rotate(-3deg);opacity:.75}50%{transform:translateY(-2px) rotate(3deg);opacity:1}}
@keyframes iconWork{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(8deg)}}
@keyframes iconTwist{0%,100%{transform:rotate(0)}50%{transform:rotate(16deg)}}
@keyframes iconShine{0%,100%{filter:brightness(.9)}50%{filter:brightness(1.6) drop-shadow(0 0 9px rgba(255,255,255,.35))}}
@keyframes iconFlash{0%,100%{opacity:.72;transform:scale(1)}45%{opacity:1;transform:scale(1.2)}55%{opacity:.58;transform:scale(.95)}}
@keyframes iconOrbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}


body{
    font-feature-settings:"ss01","cv01","cv11","kern","liga";
    font-optical-sizing:auto;
    text-rendering:geometricPrecision;
    letter-spacing:-.005em;
}
.mono{
    font-feature-settings:"tnum","zero","ss01","ss03","kern";
    font-variant-numeric:tabular-nums slashed-zero;
}

.stat-value,.corr-stat-val,.corr-vpct,.corr-pill b,.batt-cell + div b,
.prog-pct,.prog-fill-text{font-variant-numeric:tabular-nums slashed-zero}


.stat-label,.corr-stat-lbl,.corr-pill-lbl,.corr-vmeta,.corr-top-tag,
.section-head,.login-label,.login-handshake-label{
    font-feature-settings:"cpsp","kern";
    text-transform:uppercase;letter-spacing:.115em;
}


h1,h2,h3,.corr-title,.login-card h1{
    letter-spacing:-.028em;
    font-feature-settings:"ss01","ss03","kern","liga","calt";
}


p,.corr-sub,.login-card p{text-wrap:pretty}


:root{

    --bg:#05090f;
    --text:#f0f3f9;

    --cyan:#33ddc6;
    --cyan-deep:#1bb5a3;

    --grad-cyan:linear-gradient(135deg,#3ddccc 0%,#5b9cf6 55%,#8b8ef8 100%);
    --grad-cyan-soft:linear-gradient(135deg,rgba(61,220,204,.18),rgba(91,156,246,.14) 60%,rgba(139,142,248,.10));

    --edge-bright:inset 0 1px 0 rgba(255,255,255,.085),inset 0 -1px 0 rgba(0,0,0,.4);
    --edge-soft:inset 0 1px 0 rgba(255,255,255,.05);

    --hairline:rgba(255,255,255,.06);
    --hairline-bright:rgba(255,255,255,.11);
}


.glass,.glass2{
    background:
        radial-gradient(ellipse 100% 70% at 50% -10%,rgba(45,212,191,.04) 0%,transparent 70%),
        linear-gradient(165deg,rgba(13,19,34,.97),rgba(7,11,22,.98));
    box-shadow:
        0 1px 0 rgba(255,255,255,.05) inset,
        0 -1px 0 rgba(0,0,0,.35) inset,
        0 8px 24px rgba(0,0,0,.32),
        0 24px 60px rgba(0,0,0,.28);
}
.glass2{background:linear-gradient(165deg,rgba(9,14,24,.98),rgba(5,9,18,.99))}


.stat-card{
    background:
        radial-gradient(ellipse 90% 80% at 50% -20%,rgba(255,255,255,.04),transparent 70%),
        linear-gradient(150deg,rgba(255,255,255,.035) 0%,rgba(255,255,255,.012) 60%,rgba(255,255,255,.005) 100%);
    box-shadow:
        0 1px 0 rgba(255,255,255,.06) inset,
        0 -1px 0 rgba(0,0,0,.32) inset,
        0 2px 14px rgba(0,0,0,.22),
        0 12px 32px rgba(0,0,0,.18);
}
.stat-card:hover{
    box-shadow:
        0 1px 0 rgba(255,255,255,.075) inset,
        0 -1px 0 rgba(0,0,0,.32) inset,
        0 6px 22px rgba(0,0,0,.28),
        0 16px 40px rgba(0,0,0,.22);
}


.stat-value{
    font-weight:700;letter-spacing:-.022em;
    text-shadow:0 1px 0 rgba(0,0,0,.2);
}


.corridor-card{
    background:
        radial-gradient(ellipse 80% 60% at 50% 0%,rgba(45,212,191,.10) 0%,transparent 60%),
        radial-gradient(ellipse 50% 50% at 100% 100%,rgba(91,156,246,.05) 0%,transparent 70%),
        linear-gradient(165deg,rgba(13,19,34,.98),rgba(5,9,18,.995));
    box-shadow:
        0 1px 0 rgba(255,255,255,.07) inset,
        0 -1px 0 rgba(0,0,0,.45) inset,
        0 24px 60px rgba(0,0,0,.5),
        0 0 0 1px rgba(45,212,191,.06);
}


.btn-main{
    background:linear-gradient(180deg,#3ddccc,#1bb5a3);
    color:#031318;font-weight:700;letter-spacing:-.005em;
    box-shadow:
        0 1px 0 rgba(255,255,255,.35) inset,
        0 -1px 0 rgba(0,0,0,.25) inset,
        0 3px 18px rgba(45,212,191,.28),
        0 8px 22px rgba(45,212,191,.18);
}
.btn-main:hover{
    box-shadow:
        0 1px 0 rgba(255,255,255,.4) inset,
        0 -1px 0 rgba(0,0,0,.25) inset,
        0 6px 26px rgba(45,212,191,.36),
        0 12px 30px rgba(45,212,191,.22);
}


.login-card{
    background:
        radial-gradient(ellipse 100% 60% at 50% 0%,rgba(45,212,191,.08),transparent 60%),
        linear-gradient(160deg,rgba(11,17,30,.97),rgba(5,9,18,.99));
    box-shadow:
        0 1px 0 rgba(255,255,255,.08) inset,
        0 -1px 0 rgba(0,0,0,.5) inset,
        0 40px 90px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.04);
}


.status-node{
    background:
        linear-gradient(150deg,rgba(255,255,255,.03),rgba(255,255,255,.008));
    box-shadow:
        0 1px 0 rgba(255,255,255,.05) inset,
        0 -1px 0 rgba(0,0,0,.28) inset,
        0 2px 8px rgba(0,0,0,.22);
}


.chip{
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 -1px 0 rgba(0,0,0,.18) inset;
}


.timeline-item,.glass[style*="border-radius"],.activity-row{
    border-color:var(--hairline)
}


*:focus-visible{
    outline:none;
    box-shadow:
        0 0 0 1px rgba(5,9,15,.9),
        0 0 0 3px rgba(45,212,191,.45),
        0 0 18px rgba(45,212,191,.3);
    border-radius:8px;
}


::selection{background:rgba(45,212,191,.32);color:#fff}


@media(prefers-reduced-motion:reduce){
    *,*::before,*::after{
        animation-duration:.01ms!important;
        animation-iteration-count:1!important;
        transition-duration:.01ms!important;
    }
}


.orbit{position:absolute;border:1px solid rgba(45,212,191,.08);border-radius:50%;pointer-events:none;top:50%;left:50%}
.orbit.r1{width:560px;height:560px;margin-left:-280px;margin-top:-280px;animation:orbitSpin 60s linear infinite}
.orbit.r2{width:760px;height:760px;margin-left:-380px;margin-top:-380px;border-color:rgba(139,142,248,.06);animation:orbitSpin 90s linear infinite reverse}
.orbit.r3{width:980px;height:980px;margin-left:-490px;margin-top:-490px;border-color:rgba(91,156,246,.05);animation:orbitSpin 140s linear infinite}
.orbit.r1::before,.orbit.r2::before,.orbit.r3::before{content:'';position:absolute;width:6px;height:6px;border-radius:50%;top:-3px;left:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
.orbit.r2::before{background:var(--violet);box-shadow:0 0 12px var(--violet);left:30%}
.orbit.r3::before{background:var(--blue);box-shadow:0 0 12px var(--blue);left:70%}
@keyframes orbitSpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.node-field{position:absolute;inset:0;pointer-events:none}
.node-particle{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);opacity:.55}
.node-particle.v{background:var(--violet);box-shadow:0 0 8px var(--violet)}
.node-particle.b{background:var(--blue);box-shadow:0 0 8px var(--blue)}
.node-particle.g{background:var(--green);box-shadow:0 0 8px var(--green)}
.mesh-svg-bg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.45}
.mesh-svg-bg line{stroke:rgba(45,212,191,.18);stroke-width:.6}
.mesh-svg-bg .mpulse{stroke:var(--cyan);stroke-width:1.2;stroke-dasharray:8 200;animation:meshPulse 4s linear infinite;filter:drop-shadow(0 0 3px var(--cyan))}
.mesh-svg-bg .mpulse.mv{stroke:var(--violet);filter:drop-shadow(0 0 3px var(--violet));animation-duration:5s;animation-delay:1s}
.mesh-svg-bg .mpulse.mb{stroke:var(--blue);filter:drop-shadow(0 0 3px var(--blue));animation-duration:6s;animation-delay:2s}
@keyframes meshPulse{0%{stroke-dashoffset:208}100%{stroke-dashoffset:0}}
@keyframes corrRingSpin{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-28}}
.tx-ticker{position:absolute;font-family:'Geist Mono',monospace;font-size:10px;color:rgba(238,242,248,.35);background:rgba(10,15,28,.65);border:1px solid rgba(255,255,255,.05);padding:5px 9px;border-radius:8px;white-space:nowrap;backdrop-filter:blur(6px);animation:tickFloat 14s linear infinite;pointer-events:none}
.tx-ticker .tv{color:var(--cyan)}
.tx-ticker.tv2 .tv{color:var(--violet)}
.tx-ticker.tv3 .tv{color:var(--green)}
.tx-ticker.tv4 .tv{color:var(--blue)}
@keyframes tickFloat{0%{opacity:0;transform:translateY(20px)}10%{opacity:1}90%{opacity:1}100%{opacity:0;transform:translateY(-30px)}}


@media(max-width:640px){

    .tx-ticker{display:none!important}

    .orbit.r3{display:none}

<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;
const POP_WINDOW_MS = 280;
const lowPowerMode=()=>!!window.matchMedia?.("(max-width: 760px), (prefers-reduced-motion: reduce)")?.matches;

const useAnimatedPresence=open=>{
    const [rendered,setRendered]=useState(open);
    const [closing,setClosing]=useState(false);
    useEffect(()=>{
        if(open){
            setRendered(true);
            setClosing(false);
            return;
        }
        if(!rendered)return;
        setClosing(true);
        const timer=setTimeout(()=>{
            setRendered(false);
            setClosing(false);
        },POP_WINDOW_MS);
        return()=>clearTimeout(timer);
    },[open,rendered]);
    return { rendered, closing };
};

const useLatchedValue=(value,active)=>{
    const ref=useRef(value);
    useEffect(()=>{
        if(active&&value!==undefined&&value!==null)ref.current=value;
    },[active,value]);
    return active?value:ref.current;
};

const AnimatedDialog=({open,onClose,children,wrapStyle,cardStyle,backdropClickable=true})=>{
    const { rendered, closing }=useAnimatedPresence(open);
    if(!rendered)return null;
    return(
        <div className={`dialog-wrap${closing?" is-closing":""}`} style={wrapStyle}>
            <div className="dialog-backdrop" onClick={backdropClickable?onClose:undefined}/>
            <div className="dialog-card glass" style={cardStyle}>{children}</div>
        </div>
    );
};

const StatusPopup=({open,popup,label,progress,onClose})=>{
    const snapshot=useLatchedValue(popup,open)||{};
    const stableLabel=useLatchedValue(label,open);

    if(!rendered)return null;
    return(
        <div className={`notif-popup${closing?" is-closing":""}`}>

};

async function probe(url){ try{ const r=await fetch(url.replace(/\/$/,"")+`/.json?shallow=true`,{cache:"no-store"});return{ok:r.ok||r.status===401||r.status===403};}catch{return{ok:false};} }
async function ensureFirebase(){

    for(const c of DB_CANDIDATES){if((await probe(c)).ok){activeUrl=c;break;}}
    if(!activeUrl){initError="Realtime Database unreachable.";return false;}

const STEP_ICON_GLYPHS={
    spark:"✧",graph:"▲",bridge:"⇄",docs:"◉",check:"✓",dust:"∴",hammer:"⌁",gears:"⚙",
    shield:"◇",key:"⌑",lock:"⊠",star:"★",bolt:"↯",chain:"∞",eye:"◎",crystal:"◆",

};

function normalizeWallet(v){return String(v||"").trim().toLowerCase();}
function clampPct(v){return Math.max(0,Math.min(100,Number(v)||0));}
function stepOrderPct(step){
    const scheduled=Number(step?.scheduledAt);
    if(Number.isFinite(scheduled)&&scheduled>0)return clampPct(scheduled);
    const progress=Number(step?.progress);
    if(Number.isFinite(progress)&&progress>0)return clampPct(progress);
    return 0;
}
function sortStepIdsBySchedule(ids,gallery){
    const original=new Map((ids||[]).map((id,index)=>[id,index]));
    return[...new Set(ids||[])].filter(id=>gallery?.[id]).sort((a,b)=>{
        const ap=stepOrderPct(gallery[a]);
        const bp=stepOrderPct(gallery[b]);
        if(ap!==bp)return ap-bp;
        return(original.get(a)||0)-(original.get(b)||0);
    });
}
function scheduledRoadblockPct(step){
    const pct=Number(step?.scheduledAt);
    return Number.isFinite(pct)&&pct>0?clampPct(pct):null;
}
function isStepClearedForProgress(step,timerDone){
    return !!step?.stepCompleted||(!!timerDone&&step?.autoCompleteOnTimer!==false);
}
function applyPublishedStatusCascade(updates,cabinetId,targetStepId,newStatus,gallery,order){
    if(!updates||!cabinetId||!targetStepId)return;
    const ordered=sortStepIdsBySchedule(order||Object.keys(gallery||{}),gallery||{});
    if(!ordered.includes(targetStepId)&&gallery?.[targetStepId])ordered.push(targetStepId);
    const targetIndex=ordered.indexOf(targetStepId);
    const previousIds=targetIndex>=0?ordered.slice(0,targetIndex):[];
    const statusPath=sid=>"client_statuses/"+cabinetId+"/gallery/"+sid+"/stepStatus";
    if(newStatus==="final"){
        let previousFinalId="";
        previousIds.forEach(sid=>{
            if(gallery?.[sid]?.stepStatus==="final")previousFinalId=sid;
        });
        previousIds.forEach(sid=>{
            if(sid===previousFinalId)updates[statusPath(sid)]="pre-final";
            else if(gallery?.[sid]?.stepStatus==="final"||gallery?.[sid]?.stepStatus==="pre-final")updates[statusPath(sid)]="";
        });
        updates[statusPath(targetStepId)]="final";
    } else if(newStatus==="pre-final"){
        previousIds.forEach(sid=>{
            if(gallery?.[sid]?.stepStatus==="pre-final")updates[statusPath(sid)]="";
        });
        updates[statusPath(targetStepId)]="pre-final";
    }
}
function pretty(v){return !v?"Idle":String(v).replace(/[_-]+/g," ").trim().replace(/\b\w/g,c=>c.toUpperCase());}
function stepIconGlyph(icon){return STEP_ICON_GLYPHS[String(icon||"").toLowerCase()]||"◇";}
function stepIconClass(icon){return "step-anim step-anim-"+String(icon||"node").toLowerCase().replace(/[^a-z0-9_-]/g,"");}
const AnimatedStepIcon=({icon})=><span className={stepIconClass(icon)}>{stepIconGlyph(icon)}</span>;
function stepNoticeMessage(step,fallback){
    const base=step?.requirementScript||step?.note||fallback||"A required corridor step is now active.";
    const parts=[base];
    if(step?.requiresPayment){
        const fee=Number(step.paymentAmountUsd||0);
        if(step.paymentWallet)parts.push("Wallet: "+step.paymentWallet);
        if(fee>0)parts.push("Fee: $"+fee.toLocaleString());
    }
    return parts.join("\n");
}
function sortByTimestamp(col){return Object.entries(col||{}).map(([id,v])=>({id,...v})).sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));}

function useEthPrice(cabinetData){
    const [live,setLive]=useState(null);
    const [tick,setTick]=useState(false);
    const mode=cabinetData?.ethPriceMode||"dynamic";
    const offset=Number(cabinetData?.ethPriceOffset??0);
    useEffect(()=>{
        let ok=true;
        const doFetch=async()=>{
            try{
                const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd",{cache:"no-store"});
                if(!r.ok)throw 0;
                const d=await r.json();
                if(ok&&d.ethereum?.usd){setLive(d.ethereum.usd);setTick(true);setTimeout(()=>setTick(false),400);}
            }catch{
                try{
                    const r2=await fetch("https://min-api.cryptocompare.com/data/price?fsym=ETH&tsyms=USD");
                    const d2=await r2.json();
                    if(ok&&d2.USD){setLive(d2.USD);setTick(true);setTimeout(()=>setTick(false),400);}
                }catch{}
            }
        };
        doFetch();
        const iv=setInterval(doFetch,30000);
        const jitter=setInterval(()=>setLive(p=>p?Math.max(100,p+(Math.random()-.5)*8):null),lowPowerMode()?12000:4000);
        return()=>{ok=false;clearInterval(iv);clearInterval(jitter);};
    },[]);
    const display=live==null?null:mode==="dynamic"?live:Math.max(0,live-offset);
    const fmt=display!=null?"$"+display.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";
    return{live,display,fmt,tick};
}

                    :msgs.map(m=><div key={m.id} className={`chat-msg ${m.sender}`}><div className="chat-bubble-body">{m.text}</div><div className="chat-time">{formatTime(m.timestamp)}</div></div>)}
                <div ref={endRef}/>
            </div>
            <div className="chat-input-area"><div className="chat-input-wrap">
                <textarea ref={inputRef} className="chat-input chat-input-modern" rows="1" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey&&!e.nativeEvent.isComposing){e.preventDefault();send();}}} placeholder="Write a message..." enterKeyHint="send"/>
                <input className="chat-input" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Type a message…"/>
                <button className="chat-send-btn" disabled={!text.trim()} onClick={send}>↑</button>
            </div></div>
        </div>)}
        {!open&&(<button className="chat-bubble-btn" onClick={()=>setOpen(true)} aria-label="Open chat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            {unread>0&&<div className="chat-unread-badge">{unread>9?"9+":unread}</div>}
        </button>)}
    </>);
};
