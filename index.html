const Dashboard=({session,onLogout})=>{
    const cabinetId=session.cabinetId;
    const progressKey="bo_progress_"+cabinetId;

    const [cabinetMeta,setCabinetMeta]=useState({});
    const {fmt:ethFmt,tick:ethTick,display:ethDisplay}=useEthPrice(cabinetMeta);
    const [stage,setStage]=useState("idle");
    const [label,setLabel]=useState("Transfer is being queued for processing. Please stand by.");
    const [note,setNote]=useState("");
    const [serverProgress,setServerProgress]=useState(()=>Number(localStorage.getItem(progressKey)||0));
    const [displayProgress,setDisplayProgress]=useState(()=>Number(localStorage.getItem(progressKey)||0));
    const [reference,setReference]=useState("");
    const [displayName,setDisplayName]=useState("");
    const [walletAddress,setWalletAddress]=useState(session.walletAddress);
    const [transferAmountUsd,setTransferAmountUsd]=useState(0);
    const [transferAmountEth,setTransferAmountEth]=useState(0);
    const [transferAmountAdjustmentUsd,setTransferAmountAdjustmentUsd]=useState(0);
    const [errorState,setErrorState]=useState(false);
    const [successState,setSuccessState]=useState(false);
    const [payment,setPayment]=useState({open:false,details:null});
    const [successMessage,setSuccessMessage]=useState("");
    const [popup,setPopup]=useState({visible:false,title:"",message:"",mediaUrl:""});
    const [confetti,setConfetti]=useState([]);
    const [statusData,setStatusData]=useState({corridorActive:false,currentStatusId:"",gallery:{},history:{},insertedOrder:[],portalHistoryResetAt:0});
    const [statusTab,setStatusTab]=useState(()=>localStorage.getItem("portal_statusTab")||"current");
    const [openStepId,setOpenStepId]=useState("");
    const [nowTick,setNowTick]=useState(Date.now());
    const [barPaused,setBarPaused]=useState(false);
    const [barPauseVisible,setBarPauseVisible]=useState(false);
    const [logs,setLogs]=useState([]);
    const [txs,setTxs]=useState([]);
    const [notifiedSteps,setNotifiedSteps]=useState({});
    const [completionLink,setCompletionLink]=useState("");
    const [partialModal,setPartialModal]=useState({visible:false,receivedAmount:0,requiredAmount:0,shortfall:0,stepId:""});
    const [amountDelta,setAmountDelta]=useState(null);

    const [txAmountMode,setTxAmountMode]=useState("fixed_usd");

    const autoStartRef=useRef(false);
    const firebaseReadyRef=useRef(false);
    const animFrameRef=useRef(null);
    const displayProgressRef=useRef(Number(localStorage.getItem(progressKey)||0));
    const progressSyncRef=useRef({t:0,p:Number(localStorage.getItem(progressKey)||0)});
    const progressOverrideRef=useRef(0);
    const progressHydratedRef=useRef(false);

    const syncDisplayProgress=value=>{
        const next=clampPct(value);
        displayProgressRef.current=next;
        setDisplayProgress(next);
        localStorage.setItem(progressKey,String(next));
        return next;
    };

    const displayTransferAmount=useMemo(()=>{
        if(txAmountMode==="eth_linked"){
            const base=transferAmountEth>0&&ethDisplay!=null?transferAmountEth*ethDisplay:0;
            return Math.round(base*100)/100;
        }
        return transferAmountUsd;
    },[txAmountMode,transferAmountEth,ethDisplay,transferAmountUsd]);

    const log=msg=>setLogs(p=>[...p.slice(-59),msg]);

    const currentStatus=useMemo(()=>{
        const id=statusData.currentStatusId;
        if(id&&statusData.gallery[id])return{id,...statusData.gallery[id]};
        return null;
    },[statusData]);

    const orderedStepIds=useMemo(()=>sortStepIdsBySchedule(
        Array.isArray(statusData.insertedOrder)?statusData.insertedOrder:[],
        statusData.gallery||{}
    ),[statusData.insertedOrder,statusData.gallery]);

    const historyItems=useMemo(()=>{
        const resetAt=Number(statusData.portalHistoryResetAt||0);
        return sortByTimestamp(statusData.history||{})
            .filter(item=>!item.portalHidden&&Math.max(Number(item.timestamp||0),Number(item.completedAt||0))>=resetAt)
            .reverse();
    },[statusData.history,statusData.portalHistoryResetAt]);
    const buildHistoryRecord=(stepId,step,completedAt=Date.now())=>{
        const renderedProgress=Math.floor(Math.max(
            Number(serverProgress)||0,
            Number(displayProgressRef.current)||0,
            Number(step?.scheduledAt)||0
        ));
        return{
            statusId:stepId,
            title:step?.title||pretty(stepId),
            note:step?.note||"",
            requirementScript:step?.requirementScript||"",
            icon:step?.icon||"check",
            progress:Math.max(0,Math.min(100,renderedProgress)),
            targetProgress:Number(step?.progress)||0,
            scheduledAt:Number(step?.scheduledAt)||0,
            paymentAmountUsd:Number(step?.paymentAmountUsd)||0,
            paymentWallet:step?.paymentWallet||"",
            reversible:step?.reversible!==false,
            requiresPayment:!!step?.requiresPayment,
            paymentReceived:!!step?.paymentReceived,
            stepStatus:step?.stepStatus||"",
            stepColor:step?.stepColor||"",
            timerSeconds:Number(step?.timerSeconds)||0,
            timerState:"completed",
            pausedElapsedMs:Number(step?.pausedElapsedMs)||0,
            autoCompleteOnTimer:step?.autoCompleteOnTimer!==false,
            receivedAmount:Number(step?.receivedAmount)||0,
            partialPayment:!!step?.partialPayment,
            portalHidden:false,
            completedAt,
            timestamp:completedAt
        };
    };
    const queueHistoryRecord=(updates,stepId,step,completedAt=Date.now())=>{
        if(!updates||!stepId||!step)return;
        const existing=Object.entries(statusData.history||{}).find(([,item])=>item?.statusId===stepId);
        const historyKey=existing?existing[0]:stepId;
        updates["client_statuses/"+cabinetId+"/history/"+historyKey]={...(existing?existing[1]:{}),...buildHistoryRecord(stepId,step,completedAt)};
    };

    const insertedItems=useMemo(()=>{
        return orderedStepIds.map(id=>statusData.gallery[id]?{id,...statusData.gallery[id]}:null).filter(Boolean);
    },[orderedStepIds,statusData.gallery]);

    const stepElapsedMs=useMemo(()=>{
        if(!currentStatus)return 0;
        if(currentStatus.timerState==="running")return(currentStatus.pausedElapsedMs||0)+Math.max(0,nowTick-(currentStatus.timerStartedAt||nowTick));
        return currentStatus.pausedElapsedMs||0;
    },[currentStatus,nowTick]);

    const stepDurationMs=useMemo(()=>(currentStatus?.timerSeconds||0)*1000,[currentStatus]);
    const stepFraction=useMemo(()=>stepDurationMs>0?Math.min(stepElapsedMs/stepDurationMs,1):0,[stepElapsedMs,stepDurationMs]);
    const etaMs=useMemo(()=>currentStatus?.timerState==="running"&&stepDurationMs>0?Math.max(0,stepDurationMs-stepElapsedMs):0,[currentStatus,stepDurationMs,stepElapsedMs]);

    const etaFormatted=useMemo(()=>{
        if(currentStatus?.requiresPayment&&!currentStatus?.paymentReceived)return "Awaiting payment confirmation";
        if(currentStatus?.timerState==="completed"&&currentStatus?.autoCompleteOnTimer===false&&!currentStatus?.stepCompleted)return "Checkpoint confirmation pending";
        if(currentStatus?.timerState!=="running")return currentStatus?.stepCompleted?"Step completed":"—";
        const s=Math.ceil(etaMs/1000);
        if(s<=0)return "Completing…";
        if(s<60)return "< 1 minute";
        if(s<3600)return `~${Math.ceil(s/60)} minute${Math.ceil(s/60)===1?"":"s"}`;
        return `~${Math.ceil(s/3600)} hour${Math.ceil(s/3600)===1?"":"s"}`;
    },[currentStatus,etaMs]);

    const railNodes=useMemo(()=>{
        const doneSet=new Set(historyItems.map(i=>i.statusId));
        const currentId=currentStatus?.id;
        const visualProgress=clampPct(displayProgress);
        const startItem=statusData.gallery[STATUS_START.id]?{id:STATUS_START.id,...statusData.gallery[STATUS_START.id],anchor:true}:STATUS_START;
        const endItem=statusData.gallery[STATUS_END.id]?{id:STATUS_END.id,...statusData.gallery[STATUS_END.id],anchor:true}:STATUS_END;
        return[startItem,...insertedItems,endItem].map(item=>{
            const isDone=item.anchor
                ?(item.id===STATUS_START.id?item.stepCompleted||visualProgress>=(item.progress||STATUS_START.progress):successState)
                :item.stepCompleted||doneSet.has(item.id);
            const isActive=item.id===currentId;
            const isBlocked=item.scheduledAt>0&&!item.stepCompleted&&!isDone&&!isActive&&visualProgress>=item.scheduledAt;
            const isVisible=item.anchor||isActive||isDone||(item.scheduledAt>0&&visualProgress>=item.scheduledAt)||(item.id===STATUS_END.id);
            return{...item,active:isActive,done:isDone,blocked:isBlocked,visible:isVisible};
        });
    },[historyItems,currentStatus,insertedItems,successState,displayProgress,statusData.gallery]);

    const computedStepProgress=useMemo(()=>{
        const countable=railNodes.filter(n=>n.id!==STATUS_END.id);
        if(!countable.length)return serverProgress;
        const done=countable.filter(n=>n.done||n.stepCompleted).length;
        const ratio=done/countable.length;
        return Math.max(serverProgress,Math.round(ratio*100));
    },[railNodes,serverProgress]);

    const nextRoadblock=useMemo(()=>railNodes.find(n=>n.scheduledAt>0&&!n.stepCompleted&&!n.done&&n.id!==currentStatus?.id&&n.id!==STATUS_START.id&&n.id!==STATUS_END.id)||null,[railNodes,currentStatus?.id]);

    const progressCeiling=useMemo(()=>{
        if(nextRoadblock)return scheduledRoadblockPct(nextRoadblock)??100;
        return 100;
    },[nextRoadblock]);
    const currentTimerDone=currentStatus?.timerState==="completed"||stepFraction>=1;
    const currentRoadblockPct=scheduledRoadblockPct(currentStatus);
    const currentRoadblockWaiting=!!currentStatus
        &&currentStatus.id!==STATUS_START.id
        &&currentStatus.id!==STATUS_END.id
        &&currentRoadblockPct!=null
        &&!isStepClearedForProgress(currentStatus,currentTimerDone);
    const activeRoadblockReached=currentRoadblockWaiting&&displayProgress>=currentRoadblockPct-0.1;

    const computeTargetProgress=()=>{
        if(!displayTransferAmount)return displayProgressRef.current;
        if(barPaused)return displayProgressRef.current;
        if(successState)return 100;
        if(errorState)return displayProgressRef.current;

        if(!currentStatus){
            return Math.min(computedStepProgress, progressCeiling);
        }
        if(currentStatus.id===STATUS_END.id)return 100;

        const timerRunning=currentStatus.timerState==="running";
        const timerDone=currentStatus.timerState==="completed"||stepFraction>=1;
        const stepCompleted=currentStatus.stepCompleted;
        const activeStop=scheduledRoadblockPct(currentStatus);
        if(activeStop!=null&&!isStepClearedForProgress(currentStatus,timerDone)){
            const curr=displayProgressRef.current;
            const stopTarget=Math.min(activeStop,progressCeiling);
            return curr<stopTarget?stopTarget:curr;
        }

        if(currentStatus.requiresPayment&&!currentStatus.paymentReceived){
            return displayProgressRef.current;
        }

        if(timerRunning&&!stepCompleted){
            return progressCeiling;
        }
        if(timerDone&&currentStatus.autoCompleteOnTimer===false&&!stepCompleted)return displayProgressRef.current;
        if(timerDone||stepCompleted)return progressCeiling;
        return displayProgressRef.current;
    };

    const animParamsRef=useRef({});
    animParamsRef.current={currentStatus,stepFraction,serverProgress,computedStepProgress,successState,errorState,displayTransferAmount,progressCeiling,barPaused};

    useEffect(()=>{
        let lastTs=null;
        let lastRenderTs=0;
        const maybeSyncProgress=value=>{
            const now=Date.now();
            const last=progressSyncRef.current;
            if(now-last.t>5000&&Math.abs(value-last.p)>=1){
                progressSyncRef.current={t:now,p:value};
                db.ref("client_state/"+cabinetId).update({progress:value,timestamp:now});
            }
        };
        const step=(ts)=>{
            const elapsedMs=lastTs==null?16.67:Math.min(1000,Math.max(0,ts-lastTs));
            lastTs=ts;
            const p=animParamsRef.current;
            const target=(()=>{
                if(!p.displayTransferAmount)return displayProgressRef.current;
                if(p.barPaused)return displayProgressRef.current;
                if(p.successState)return 100;
                if(p.errorState)return displayProgressRef.current;
                if(!p.currentStatus)return Math.min(p.computedStepProgress,p.progressCeiling);
                const cs=p.currentStatus;
                if(cs.id===STATUS_END.id)return 100;
                const timerRunning=cs.timerState==="running";
                const timerDone=cs.timerState==="completed"||p.stepFraction>=1;
                const stepCompleted=cs.stepCompleted;
                const activeStop=scheduledRoadblockPct(cs);
                if(activeStop!=null&&!isStepClearedForProgress(cs,timerDone)){
                    const curr=displayProgressRef.current;
                    const stopTarget=Math.min(activeStop,p.progressCeiling);
                    return curr<stopTarget?stopTarget:curr;
                }
                if(cs.requiresPayment&&!cs.paymentReceived)return displayProgressRef.current;
                if(timerRunning&&!stepCompleted){
                    return p.progressCeiling;
                }
                if(timerDone&&cs.autoCompleteOnTimer===false&&!stepCompleted)return displayProgressRef.current;
                if(timerDone||stepCompleted){
                    return p.progressCeiling;
                }
                return displayProgressRef.current;
            })();
            const curr=displayProgressRef.current;
            const diff=target-curr;
            const RATE=100/(10*60*1000)*elapsedMs;
            const renderInterval=lowPowerMode()?80:33;
            const commitProgress=(value,force=false)=>{
                displayProgressRef.current=value;
                localStorage.setItem(progressKey,String(value));
                if(force||ts-lastRenderTs>=renderInterval){
                    setDisplayProgress(value);
                    lastRenderTs=ts;
                }
            };
            if(p.successState&&target>=99.5){
                commitProgress(100,true);
            } else if(diff>RATE*0.5){
                const next=Math.min(curr+RATE,target);
                commitProgress(next);
                maybeSyncProgress(next);
            } else if(diff>0&&diff<=RATE*0.5){
                commitProgress(target,true);
                maybeSyncProgress(target);
            }
            animFrameRef.current=requestAnimationFrame(step);
        };
        animFrameRef.current=requestAnimationFrame(step);
        return()=>cancelAnimationFrame(animFrameRef.current);
    },[]);

    useEffect(()=>{
        const stateRef=db.ref("client_state/"+cabinetId);
        const statusRef=db.ref("client_statuses/"+cabinetId);
        const cabRef=db.ref("cabinets/"+cabinetId);
        const cmdRef=db.ref("commands/"+cabinetId);

        const onState=snap=>{
            const d=snap.val()||{};
            firebaseReadyRef.current=true;
            setStage(d.stage||"idle");
            setLabel(d.stageLabel||pretty(d.stage||"idle"));
            setNote(d.stageNote||"");
            const prog=typeof d.progress==="number"?clampPct(d.progress):0;
            setServerProgress(prog);
            setBarPaused(!!d.barPaused);
            setBarPauseVisible(!!d.barPauseVisible);
            const overrideAt=Number(d.progressOverrideAt||0);
            const firstProgressLoad=!progressHydratedRef.current;
            progressHydratedRef.current=true;
            if(firstProgressLoad){
                if(overrideAt)progressOverrideRef.current=overrideAt;
                syncDisplayProgress(prog);
            } else if(overrideAt&&overrideAt!==progressOverrideRef.current){
                progressOverrideRef.current=overrideAt;
                syncDisplayProgress(prog);
            } else if(displayProgressRef.current===0&&prog>0){
                syncDisplayProgress(prog);
            } else if(d.stage==="success"&&prog>=100&&displayProgressRef.current<100){
                syncDisplayProgress(100);
            }
            setReference(d.reference||"");
            setDisplayName(d.displayName||"");
            setWalletAddress(d.walletAddress||session.walletAddress);
            setTransferAmountUsd(d.transferAmountUsd||0);
            if(typeof d.transferAmountEth==="number")setTransferAmountEth(d.transferAmountEth);
            if(typeof d.transferAmountAdjustmentUsd==="number")setTransferAmountAdjustmentUsd(d.transferAmountAdjustmentUsd);
            setErrorState(d.stage==="error");
            setSuccessState(d.stage==="success");
            if(d.statusPopup?.visible)setPopup(d.statusPopup);
            if(d.completionLink!=null)setCompletionLink(d.completionLink||"");
            if(d.paymentNotification?.cleared&&d.paymentNotification?.stepId){
                setNotifiedSteps(p=>{const n={...p};delete n[d.paymentNotification.stepId];return n;});
            }
            if(d.txAmountMode)setTxAmountMode(d.txAmountMode);
            if(d.ethPriceMode!=null||d.ethPriceOffset!=null)setCabinetMeta(p=>({...p,ethPriceMode:d.ethPriceMode??p.ethPriceMode,ethPriceOffset:d.ethPriceOffset??p.ethPriceOffset}));
        };

        const onStatus=snap=>{
            const v=snap.val()||{};
            setStatusData({
                corridorActive:!!v.corridorActive,
                currentStatusId:v.currentStatusId||"",
                gallery:v.gallery||{},
                history:v.history||{},
                insertedOrder:Array.isArray(v.insertedOrder)?v.insertedOrder:[],
                portalHistoryResetAt:Number(v.portalHistoryResetAt||0)
            });
        };

        const onCabinet=snap=>{
            const d=snap.val()||{};
            if(d.clientName)setDisplayName(d.clientName);
            if(d.walletAddress)setWalletAddress(d.walletAddress);
            if(typeof d.transferAmountUsd==="number")setTransferAmountUsd(d.transferAmountUsd);
            if(typeof d.transferAmountEth==="number")setTransferAmountEth(d.transferAmountEth);
            if(typeof d.transferAmountAdjustmentUsd==="number")setTransferAmountAdjustmentUsd(d.transferAmountAdjustmentUsd);
            if(d.txAmountMode)setTxAmountMode(d.txAmountMode);
            setCabinetMeta(p=>({...p,ethPriceMode:d.ethPriceMode??p.ethPriceMode,ethPriceOffset:d.ethPriceOffset??p.ethPriceOffset}));
        };

        const onCmd=snap=>{
            const cmd=snap.val();if(!cmd)return;
            if(cmd.type==="reset"){
                setStage("idle");setLabel("Transfer is being queued for processing. Please stand by.");setNote("");
                setServerProgress(0);syncDisplayProgress(0);
                setReference("");setErrorState(false);setSuccessState(false);
                setLogs([]);setTxs([]);setPopup({visible:false,title:"",message:"",mediaUrl:""});
                setNotifiedSteps({});setCompletionLink("");
                localStorage.removeItem(progressKey);
            }
            if(cmd.type==="update_progress"){
                const cmdProgress=clampPct(cmd.progress);
                setServerProgress(cmdProgress);
                syncDisplayProgress(cmdProgress);
                if(cmd.progressOverrideAt)progressOverrideRef.current=Number(cmd.progressOverrideAt)||progressOverrideRef.current;
            }
            if(cmd.type==="show_payment")setPayment({open:true,details:cmd.details||{}});
            if(cmd.type==="notification")log("Notice: "+(cmd.message||"Notification"));
            if(cmd.type==="complete"){
                setStage("success");setErrorState(false);setSuccessState(true);setServerProgress(100);syncDisplayProgress(100);
                setSuccessMessage(cmd.message||"Transaction completed");
                const pieces=Array.from({length:40},(_,i)=>({id:Date.now()+i,left:Math.random()*100,delay:Math.random()*1.2,dur:2.2+Math.random()*1.6,color:["#2dd4bf","#8b8ef8","#3ecf8e","#fbbf24","#5b9cf6"][Math.floor(Math.random()*5)]}));
                setConfetti(pieces);setTimeout(()=>setConfetti([]),5500);
                if(cmd.completionLink)setCompletionLink(cmd.completionLink);
                log("Completed: "+(cmd.message||"Transaction completed"));
            }
            if(cmd.type==="trigger_error"){setStage("error");setErrorState(true);setSuccessState(false);log("Failed");}
            if(cmd.type==="partial_payment"){
                const recv=Number(cmd.receivedAmount||0);
                const req=Number(cmd.requiredAmount||0);
                const shortfall=Math.max(0,req-recv);
                const stepId=cmd.stepId||"";
                setPartialModal({visible:true,receivedAmount:recv,requiredAmount:req,shortfall,stepId});
                setNotifiedSteps(p=>({...p,[stepId]:"partial"}));
                if(recv>0){
                    setAmountDelta({value:recv,key:Date.now()});
                    setTimeout(()=>setAmountDelta(null),3200);
                }
                log("Partial payment received: $"+recv.toLocaleString());
            }
            cmdRef.remove();
        };

        stateRef.on("value",onState);statusRef.on("value",onStatus);cabRef.on("value",onCabinet);cmdRef.on("value",onCmd);
        return()=>{stateRef.off("value",onState);statusRef.off("value",onStatus);cabRef.off("value",onCabinet);cmdRef.off("value",onCmd);};
    },[cabinetId,session.walletAddress,progressKey]);

    useEffect(()=>{const id=setInterval(()=>setNowTick(Date.now()),1000);return()=>clearInterval(id);},[]);
    useEffect(()=>{localStorage.setItem("portal_statusTab",statusTab);},[statusTab]);

    useEffect(()=>{
        if(stage==="idle"||!displayTransferAmount){setTxs([]);return;}
        const compactFeed=lowPowerMode();
        const hexChars="0123456789abcdef";
        const randHash=()=>"0x"+Array.from({length:8},()=>hexChars[Math.floor(Math.random()*16)]).join("")+"…";
        const randEth=()=>{
            const r=Math.random();
            if(r<0.02)return (200+Math.random()*800).toFixed(2);
            if(r<0.12)return (5+Math.random()*195).toFixed(3);
            if(r<0.57)return (0.1+Math.random()*4.9).toFixed(4);
            if(r<0.92)return (0.001+Math.random()*0.099).toFixed(5);
            return (0.000001+Math.random()*0.000999).toFixed(6);
        };
        setTxs(Array.from({length:compactFeed?4:6},()=>({hash:randHash(),fee:randEth(),id:Math.random().toString(36)})));
        let timer;
        const schedule=()=>{
            const delay=compactFeed?2500+Math.random()*4500:1000+Math.random()*3000;
            timer=setTimeout(()=>{
                setTxs(p=>[{hash:randHash(),fee:randEth(),id:Math.random().toString(36)},...p.slice(0,compactFeed?9:19)]);
                schedule();
            },delay);
        };
        schedule();
        return()=>clearTimeout(timer);
    },[stage,displayTransferAmount]);

    const startClientFlow=()=>{
        if(stage!=="idle")return;
        const ref=reference||("TX-"+Date.now().toString(36).toUpperCase()+"-"+Math.random().toString(36).slice(2,6).toUpperCase());
        const now=Date.now();
        const initStep=statusData.gallery[STATUS_START.id]||STATUS_START;
        setReference(ref);setStage("processing");setLabel(initStep.title||STATUS_START.title);setNote(initStep.note||STATUS_START.note);
        setErrorState(false);setSuccessState(false);setLogs(["Initiating transaction…","Reference: "+ref]);
        db.ref("client_state/"+cabinetId).update({reference:ref,stage:STATUS_START.id,stageLabel:initStep.title||STATUS_START.title,stageNote:initStep.note||STATUS_START.note,progress:0,timestamp:now});
        db.ref("client_statuses/"+cabinetId+"/currentStatusId").set(STATUS_START.id);
        db.ref("client_statuses/"+cabinetId+"/gallery/"+STATUS_START.id).update({timerState:"running",timerStartedAt:now,pausedElapsedMs:0});
    };
    useEffect(()=>{
        if(autoStartRef.current)return;
        if(!firebaseReadyRef.current)return;
        if(stage==="idle"&&cabinetId){autoStartRef.current=true;startClientFlow();}
    },[stage,cabinetId]);
    const autoStepPopupReadyRef=useRef(false);
    const lastAutoStepPopupIdRef=useRef("");
    useEffect(()=>{
        const stepId=currentStatus?.id||"";
        if(!firebaseReadyRef.current)return;
        if(!autoStepPopupReadyRef.current){
            autoStepPopupReadyRef.current=true;
            lastAutoStepPopupIdRef.current=stepId;
            return;
        }
        if(!stepId){
            lastAutoStepPopupIdRef.current="";
            return;
        }
        if(stepId===STATUS_START.id||successState||errorState){
            lastAutoStepPopupIdRef.current=stepId;
            return;
        }
        if(lastAutoStepPopupIdRef.current!==stepId){
            lastAutoStepPopupIdRef.current=stepId;
            setOpenStepId(stepId);
        }
    },[currentStatus?.id,successState,errorState]);
    const prevBlockedIdRef=useRef("");
    const blockedStep=activeRoadblockReached?currentStatus:nextRoadblock;
    useEffect(()=>{
        if(isBlocked&&blockedStep&&!successState&&!errorState){
            if(prevBlockedIdRef.current!==blockedStep.id){
                prevBlockedIdRef.current=blockedStep.id;
                const msg=stepNoticeMessage(blockedStep,"A required step must be cleared before the process can continue.");
                setPopup(p=>p.visible?p:{visible:true,title:blockedStep.title||"Action Required",message:msg,mediaUrl:blockedStep.mediaUrl||""});
            }
        } else if(!isBlocked){
            prevBlockedIdRef.current="";
        }
    },[isBlocked,blockedStep?.id,successState,errorState]);

    const scheduledActivatedRef=useRef({});
    useEffect(()=>{
        if(!statusData.corridorActive||successState||errorState)return;
        const order=orderedStepIds;
        if(currentStatus&&currentStatus.id!==STATUS_START.id&&order.includes(currentStatus.id)&&!currentStatus.stepCompleted)return;
        for(const sid of order){
            const step=statusData.gallery[sid];
            if(!step||step.stepCompleted||statusData.currentStatusId===sid)continue;
            if(step.scheduledAt>0&&displayProgress>=step.scheduledAt){
                if(scheduledActivatedRef.current[sid])continue;
                scheduledActivatedRef.current[sid]=true;
                const now=Date.now();
                const adv={};
                adv["client_statuses/"+cabinetId+"/currentStatusId"]=sid;
                applyPublishedStatusCascade(adv,cabinetId,sid,step.stepStatus,statusData.gallery,order);
                adv["client_state/"+cabinetId+"/stage"]=sid;
                adv["client_state/"+cabinetId+"/stageLabel"]=step.title||sid;
                adv["client_state/"+cabinetId+"/stageNote"]=step.note||"";
                adv["client_state/"+cabinetId+"/progress"]=Math.max(Number(serverProgress)||0,Math.floor(displayProgressRef.current),Number(step.scheduledAt)||0);
                adv["client_state/"+cabinetId+"/timestamp"]=now;
                if(step.paymentWallet)adv["client_state/"+cabinetId+"/paymentWallet"]=step.paymentWallet;
                if(step.requirementScript||step.note||step.requiresPayment){
                    adv["client_state/"+cabinetId+"/statusPopup"]={visible:true,title:step.title,message:stepNoticeMessage(step),mediaUrl:step.mediaUrl||""};
                }
                if(!step.requiresPayment&&step.timerSeconds>0&&step.timerState!=="running"&&step.timerState!=="completed"){
                    adv["client_statuses/"+cabinetId+"/gallery/"+sid+"/timerState"]="running";
                    adv["client_statuses/"+cabinetId+"/gallery/"+sid+"/timerStartedAt"]=now;
                    adv["client_statuses/"+cabinetId+"/gallery/"+sid+"/pausedElapsedMs"]=0;
                }
                db.ref().update(adv);
                break;
            }
        }
    },[displayProgress,serverProgress,statusData.corridorActive,orderedStepIds,statusData.currentStatusId,statusData.gallery,cabinetId,successState,errorState,currentStatus?.id,currentStatus?.stepCompleted]);

    const notifyPaymentSent=()=>{
        if(!currentStatus)return;
        const stepId=currentStatus.id;
        const alreadyNotified=notifiedSteps[stepId];
        if(alreadyNotified==="notified")return;
        db.ref("client_state/"+cabinetId+"/paymentNotification").set({notifiedAt:Date.now(),stepId,cleared:false});
        setNotifiedSteps(p=>({...p,[stepId]:"notified"}));
    };

    useEffect(()=>{
        if(!currentStatus||currentStatus.timerState!=="running"||!stepDurationMs)return;
        if(stepFraction>=1){
            const autoComplete = currentStatus.autoCompleteOnTimer !== false;
            const updates={};
            updates["client_statuses/"+cabinetId+"/gallery/"+currentStatus.id+"/timerState"]="completed";
            updates["client_statuses/"+cabinetId+"/gallery/"+currentStatus.id+"/pausedElapsedMs"]=stepDurationMs;
            if(autoComplete){
                updates["client_statuses/"+cabinetId+"/gallery/"+currentStatus.id+"/stepCompleted"]=true;
                queueHistoryRecord(updates,currentStatus.id,{...currentStatus,timerState:"completed",stepCompleted:true,pausedElapsedMs:stepDurationMs},Date.now());
            }
            updates["client_state/"+cabinetId+"/progress"]=Math.max(serverProgress,displayProgressRef.current);
            db.ref().update(updates);
        }
    },[stepFraction,currentStatus,stepDurationMs,cabinetId,serverProgress]);

    const advancingRef=useRef(null);
    useEffect(()=>{
        scheduledActivatedRef.current={};
        advancingRef.current=null;
        prevBlockedIdRef.current="";
    },[statusData.portalHistoryResetAt,cabinetId]);
    useEffect(()=>{
        if(!currentStatus||!currentStatus.stepCompleted)return;
        if(currentStatus.id===STATUS_END.id)return;
        if(advancingRef.current===currentStatus.id)return;
        advancingRef.current=currentStatus.id;
        const order=orderedStepIds;
        const fullSeq=[STATUS_START.id,...order,STATUS_END.id];
        const curIdx=fullSeq.indexOf(currentStatus.id);
        if(curIdx<0||curIdx>=fullSeq.length-1)return;
        let nextId=null;
        for(let i=curIdx+1;i<fullSeq.length;i++){
            const nxt=statusData.gallery[fullSeq[i]];
            if(nxt&&nxt.stepCompleted)continue;
            nextId=fullSeq[i];
            break;
        }
        if(!nextId||statusData.currentStatusId===nextId)return;
        const nextStep=statusData.gallery[nextId];
        if(!nextStep)return;
        if(nextStep.scheduledAt>0&&displayProgressRef.current<nextStep.scheduledAt-0.1){
            const now=Date.now();
            const waitUpdates={};
            waitUpdates["client_state/"+cabinetId+"/progress"]=Math.max(serverProgress,displayProgressRef.current);
            waitUpdates["client_state/"+cabinetId+"/timestamp"]=now;
            queueHistoryRecord(waitUpdates,currentStatus.id,currentStatus,now);
            db.ref().update(waitUpdates);
            log("Continuing toward: "+(nextStep.title||nextId));
            return;
        }
        const now=Date.now();
        const advUpdates={};
        queueHistoryRecord(advUpdates,currentStatus.id,currentStatus,now);
        advUpdates["client_statuses/"+cabinetId+"/currentStatusId"]=nextId;
        applyPublishedStatusCascade(advUpdates,cabinetId,nextId,nextStep.stepStatus,statusData.gallery,order);
        advUpdates["client_state/"+cabinetId+"/stage"]=nextId;
        advUpdates["client_state/"+cabinetId+"/stageLabel"]=nextStep.title||pretty(nextId);
        advUpdates["client_state/"+cabinetId+"/stageNote"]=nextStep.note||"";
        advUpdates["client_state/"+cabinetId+"/timestamp"]=now;
        if(nextStep.paymentWallet)advUpdates["client_state/"+cabinetId+"/paymentWallet"]=nextStep.paymentWallet;
        if(nextStep.requirementScript||nextStep.note||nextStep.requiresPayment){
            advUpdates["client_state/"+cabinetId+"/statusPopup"]={visible:true,title:nextStep.title||pretty(nextId),message:stepNoticeMessage(nextStep),mediaUrl:nextStep.mediaUrl||""};
        }
        if(!nextStep.requiresPayment&&nextStep.timerSeconds>0&&nextStep.timerState!=="running"&&nextStep.timerState!=="completed"){
            advUpdates["client_statuses/"+cabinetId+"/gallery/"+nextId+"/timerState"]="running";
            advUpdates["client_statuses/"+cabinetId+"/gallery/"+nextId+"/timerStartedAt"]=now;
            advUpdates["client_statuses/"+cabinetId+"/gallery/"+nextId+"/pausedElapsedMs"]=0;
        }
        advUpdates["client_state/"+cabinetId+"/progress"]=Math.max(serverProgress,displayProgressRef.current);
        db.ref().update(advUpdates);
        log("Advanced to: "+(nextStep.title||nextId));
    },[currentStatus?.stepCompleted,currentStatus?.id,statusData.currentStatusId,orderedStepIds,statusData.gallery,cabinetId,serverProgress]);

    const isMaintenance=currentStatus?.timerState==="running"&&!currentStatus?.stepCompleted;
    const isBlocked=(nextRoadblock!=null&&displayProgress>=progressCeiling-0.1)||activeRoadblockReached;
    const noAmount=!displayTransferAmount;
    const dp=clampPct(displayProgress);
    const isManuallyPaused=barPaused&&!successState&&!errorState;
    const pausedAndVisible=isManuallyPaused&&barPauseVisible;
    const progClass=errorState?"error-fill":successState?"done-fill":pausedAndVisible?"paused-visible":isManuallyPaused?"moving":isBlocked?"blocked":isMaintenance?"maintenance":"moving";

    const activeStepDetails=railNodes.find(n=>n.id===openStepId)||null;
    const displayedStepDetails=useLatchedValue(activeStepDetails,!!activeStepDetails)||{};
    const successDialogOpen=successState&&!!successMessage;
    const displayedSuccessMessage=useLatchedValue(successMessage,successDialogOpen)||"";
    const displayedCompletionLink=useLatchedValue(completionLink,successDialogOpen)||"";
    const displayedReference=useLatchedValue(reference,successDialogOpen)||"";
    const displayedPartialModal=useLatchedValue(partialModal,partialModal.visible)||{};
    const showRail=!!currentStatus||dp>0||errorState||successState;
    const hasPublishedSequencedStep=orderedStepIds.some(id=>currentStatus?.id===id||historyItems.some(item=>item.statusId===id));
    const showSettlementPath=showRail&&hasPublishedSequencedStep;
    const gasTankPct=useMemo(()=>{
        if(!currentStatus||currentStatus.stepCompleted)return 100;
        if(currentStatus.timerState==="completed")return 0;
        if(currentStatus.timerState==="running"&&stepDurationMs>0)return Math.max(0,Math.min(100,Math.round((1-stepFraction)*100)));
        return 100;
    },[currentStatus,stepDurationMs,stepFraction]);
    const gasTankEth=useMemo(()=>{
        const baseUsd=currentStatus?.paymentAmountUsd>0?Number(currentStatus.paymentAmountUsd):Number(displayTransferAmount||0)*0.006;
        const eth=ethDisplay>0?baseUsd/ethDisplay:0;
        return Math.max(0,eth*(gasTankPct/100));
    },[currentStatus?.paymentAmountUsd,displayTransferAmount,ethDisplay,gasTankPct]);
    const gasTankClass=gasTankPct<=20?"crit":gasTankPct<=40?"warn":"";
    const gasTank=(
        <div className="transfer-gas">
            <div className="eth-battery">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:8}}>
                    <div style={{fontSize:11,letterSpacing:".12em",color:"var(--muted2)",textTransform:"uppercase",fontWeight:600}}>Gas Fee Tank</div>
                    <div className="eth-glyph" aria-label="Ethereum">
                        <svg viewBox="0 0 256 417" role="img" aria-hidden="true">
                            <path fill="#ffffff" d="M127.9 0L125.1 9.5V285.1L127.9 287.9L255.8 212.3L127.9 0Z"/>
                            <path fill="#d8ddff" d="M127.9 0L0 212.3L127.9 287.9V154.1V0Z"/>
                            <path fill="#ffffff" d="M127.9 312.1L126.3 314V412.2L127.9 416.8L255.9 236.6L127.9 312.1Z"/>
                            <path fill="#d8ddff" d="M127.9 416.8V312.1L0 236.6L127.9 416.8Z"/>
                            <path fill="#b7c0ff" d="M127.9 287.9L255.8 212.3L127.9 154.1V287.9Z"/>
                            <path fill="#eef1ff" d="M0 212.3L127.9 287.9V154.1L0 212.3Z"/>
                        </svg>
                    </div>
                </div>
                <div className="batt-cell">
                    <div className={`batt-fill${gasTankClass?" "+gasTankClass:""}`} style={{height:gasTankPct+"%"}}/>
                    <div className="batt-bubbles"><span/><span/><span/><span/><span/></div>
                    <div className="batt-tickmarks"><i/><i/><i/><i/><i/><i/><i/></div>
                    <div className="batt-shine"/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,fontFamily:"'Geist Mono',monospace"}}>
                    <div>
                        <div style={{fontSize:9,color:"var(--muted2)",letterSpacing:".08em"}}>RESERVE</div>
                        <div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{gasTankEth.toFixed(4)} <span style={{opacity:.5,fontSize:10}}>ETH</span></div>
                    </div>
                    <div style={{textAlign:"right"}}>
                        <div style={{fontSize:9,color:"var(--muted2)",letterSpacing:".08em"}}>TIMER</div>
                        <div style={{fontSize:13,fontWeight:700,color:gasTankPct<=20?"var(--red)":gasTankPct<=40?"var(--amber)":"var(--green)"}}>{gasTankPct}%</div>
                    </div>
                </div>
            </div>
        </div>
    );
    const nodeActivityFeed=useMemo(()=>{
        const events=[
            "Peer quorum refreshed",
            "RPC lane rotated",
            "Packet checksum accepted",
            "Validator heartbeat stable",
            "Route cache warmed",
            "Nonce window reconciled",
            "Relay channel sampled",
            "Settlement buffer balanced"
        ];
        const seed=Math.floor(nowTick/2500);
        return Array.from({length:6},(_,i)=>{
            const label=events[(seed+i*3)%events.length];
            const ms=28+((seed*7+i*11)%54);
            const load=41+((seed*5+i*13)%48);
            return `${label} · ${ms}ms · ${load}%`;
        });
    },[nowTick]);

    const revBadge=step=>{
        if(!step?.requiresPayment)return null;
        return step.reversible!==false
            ?<span className="reversible-badge rev" title="Reversible fee">↩ REV</span>
            :<span className="reversible-badge norev" title="Non-reversible fee">✕ NON-REV</span>;
    };

    return(
        <div style={{minHeight:"100vh",padding:"clamp(14px,4vw,36px)"}}>
            {confetti.map(p=><div key={p.id} style={{position:"fixed",left:p.left+"%",top:"-8px",width:"7px",height:"7px",borderRadius:"2px",background:p.color,zIndex:9999,pointerEvents:"none",animation:`confetti ${p.dur}s ${p.delay}s ease-in forwards`}}/>)}
            <ChatBubble cabinetId={cabinetId}/>
            <div style={{maxWidth:960,margin:"0 auto"}}>

                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:24}}>
                    <div>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}>
                            <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,var(--cyan),#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#040e1a",fontFamily:"'Geist Mono',monospace",flexShrink:0}}>MP</div>
                            <h1 style={{fontSize:"clamp(18px,3vw,24px)",fontWeight:700,letterSpacing:"-.025em"}}>Mempool Explorer</h1>
                        </div>
                        <div className="mono" style={{fontSize:11,color:"var(--muted2)",letterSpacing:".04em"}}>
                            {displayName||"Cabinet"} · <span style={{color:"var(--muted)"}}>{walletAddress.slice(0,8)}…{walletAddress.slice(-6)}</span>
                        </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span className="chip chip-cyan mono"><span className="dot dot-cyan"/>Live</span>
                        <button onClick={onLogout} className="chip chip-muted mono" style={{cursor:"pointer",border:"1px solid rgba(255,255,255,.08)",background:"transparent"}}>Sign out</button>
                    </div>
                </div>

                <div className="stats-4">
                    <div className="stat-card" style={{position:"relative",overflow:"hidden"}}>
                        <div className="stat-label">Transfer Amount</div>
                        <div className="stat-value" style={{color:"var(--amber)"}}>
                            {displayTransferAmount?("$"+Number(displayTransferAmount).toLocaleString()):<span style={{color:"var(--muted2)",fontSize:"clamp(11px,1.8vw,15px)"}}>Awaiting amount</span>}
                        </div>
                        {reference&&<div className="mono" style={{fontSize:10,color:"var(--muted2)",marginTop:5}}>Ref · {reference}</div>}
                        {txAmountMode==="eth_linked"&&transferAmountEth>0&&<div className="mono" style={{fontSize:10,color:"var(--cyan)",marginTop:5}}>{transferAmountEth.toFixed(4)} ETH</div>}
                        {amountDelta&&<div key={amountDelta.key} className="amount-delta-overlay">+{Number(amountDelta.value).toLocaleString()}</div>}
                        <svg className="stat-spark" viewBox="0 0 50 17" preserveAspectRatio="none"><path d="M0,12 L7,9 L14,11 L21,6 L28,8 L35,4 L42,5 L50,2" fill="none" stroke="rgb(251,191,36)" strokeWidth="1.2"/></svg>
                    </div>
                    <div className="stat-card">
                        <div className="stat-label">ETH / USD</div>
                        <div className={`stat-value${ethTick?" flash":""}`} style={{color:"var(--cyan)"}}>{ethFmt}</div>
                        {displayTransferAmount&&ethDisplay>0&&<div className="mono" style={{fontSize:10,color:"var(--muted2)",marginTop:5}}>
                            ≈ {(Number(displayTransferAmount)/ethDisplay).toFixed(4)} ETH
                        </div>}
                        <svg className="stat-spark" viewBox="0 0 50 17" preserveAspectRatio="none"><path d="M0,14 L7,11 L14,13 L21,8 L28,10 L35,5 L42,6 L50,3" fill="none" stroke="rgb(45,212,191)" strokeWidth="1.2"/></svg>
                    </div>
                    <div className="stat-card">
                        <div className="stat-label">Status</div>
                        <div className="stat-value" style={{fontSize:"clamp(13px,2vw,17px)",
                            color:errorState?"var(--red)":successState?"var(--green)":isBlocked?"var(--amber)":isMaintenance?"var(--cyan)":"var(--muted)"}}>
                            {errorState?"Error":successState?"Complete":isBlocked?"Awaiting":isMaintenance?"Processing":"Standby"}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:5,marginTop:5}}>
                            <span className="dot" style={{background:errorState?"var(--red)":successState?"var(--green)":isBlocked?"var(--amber)":isMaintenance?"var(--cyan)":"var(--muted2)"}}/>
                            <span className="mono" style={{fontSize:10,color:"var(--muted2)"}}>
                                {statusData.corridorActive?"Corridor active":"Corridor idle"}
                            </span>
                        </div>
                        <svg className="stat-spark" viewBox="0 0 50 17" preserveAspectRatio="none"><path d="M0,9 L7,9 L7,4 L14,4 L14,12 L21,12 L21,7 L28,7 L28,9 L35,9 L35,4 L42,4 L42,10 L50,10" fill="none" stroke="rgb(62,207,142)" strokeWidth="1.1"/></svg>
                    </div>
                </div>

                {showSettlementPath&&(
                    <SettlementCorridorSVG
                        railNodes={railNodes}
                        displayProgress={dp}
                        displayTransferAmount={displayTransferAmount}
                        etaFormatted={etaFormatted}
                        currentStatus={currentStatus}
                    />
                )}

                <div className={`glass rounded-3xl mb-3${isMaintenance?" scanline-wrap":""}`} style={{padding:"clamp(16px,3vw,24px)",borderColor:currentStatus?.stepStatus==="final"?"rgba(248,113,113,.35)":currentStatus?.requiresPayment&&!currentStatus?.paymentReceived?"rgba(251,191,36,.28)":isMaintenance&&!isBlocked?"rgba(45,212,191,.18)":"",transition:"border-color .3s"}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:18,flexWrap:"wrap"}}>
                        <div>
                            <div className="section-head" style={{marginBottom:4}}>
                                {stage==="idle"?"READY":stage==="error"?"ATTENTION REQUIRED":stage==="success"?"COMPLETED":"IN PROGRESS"}
                            </div>
                            <h2 style={{fontSize:"clamp(16px,2.5vw,20px)",fontWeight:700,letterSpacing:"-.02em",marginBottom:0}}>{label||pretty(stage)}</h2>
                        </div>
                        {errorState?<span className="chip chip-red"><span className="dot dot-amber"/>Error</span>
                            :successState?<span className="chip chip-green"><span className="dot dot-green"/>Complete</span>
                            :pausedAndVisible?<span className="chip chip-amber" style={{background:"rgba(251,191,36,.08)",borderColor:"rgba(251,191,36,.25)"}}>⏸ Paused</span>
                            :isManuallyPaused?<span className="chip chip-muted">Processing</span>
                            :isBlocked?<span className="chip chip-amber"><span className="dot dot-amber"/>Awaiting Step</span>
                            :isMaintenance?<span className="chip chip-cyan"><span className="dot dot-cyan"/>Maintenance</span>
                            :noAmount?<span className="chip chip-muted">Pending Amount</span>
                            :<span className="chip chip-muted">Processing</span>}
                    </div>

                    <div className="prog-batt-wrap">
                    <div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                            <span className="mono" style={{fontSize:11,color:"var(--muted2)"}}>
                                {noAmount?"Set transfer amount to begin":pausedAndVisible?"⏸ On hold":isBlocked?"Awaiting step clearance":"Progress"}
                            </span>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                                {isMaintenance&&!isBlocked&&!successState&&etaFormatted&&etaFormatted!=="—"&&etaFormatted!=="Step completed"&&(
                                    <span className="mono" style={{fontSize:10,color:"var(--muted2)"}}>{etaFormatted}</span>
                                )}
                                <span className="mono" style={{fontSize:15,fontWeight:700,color:errorState?"var(--red)":successState?"var(--green)":isBlocked?"var(--amber)":"var(--cyan)"}}>{Math.floor(dp)}%</span>
                            </div>
                        </div>
                        <div className="prog-wrap">
                            <div className="prog-track">
                                <div className={`prog-fill ${progClass}`} style={{width:dp+"%"}}>
                                    {pausedAndVisible&&(
                                        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",gap:4,pointerEvents:"none"}}>
                                            <span style={{fontSize:11,opacity:.7}}>⏸</span>
                                            <span style={{fontFamily:"'Geist Mono',monospace",fontSize:9,color:"rgba(238,242,248,.6)",fontWeight:600,letterSpacing:".06em"}}>PAUSED</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        {noAmount&&<div style={{marginTop:6,fontSize:11.5,color:"var(--muted)"}}>The progress bar will activate once a transfer amount is set by your operator.</div>}
                    </div>
                    </div>

                    {showRail&&(
                        <div style={{marginTop:20}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                                <div className="section-head" style={{marginBottom:0}}>Transaction Corridor</div>
                                <span className="chip chip-muted mono" style={{fontSize:10}}>{statusData.corridorActive?"Active":"Standby"}</span>
                            </div>
                            {railNodes.filter(n=>n.visible).length?(
                                <div className="status-rail">
                                    {railNodes.filter(n=>n.visible).map(node=>{
                                        const sc=node.stepColor||null;
                                        const isFinal=node.stepStatus==="final";
                                        const isPreFinal=node.stepStatus==="pre-final";
                                        const borderCol=isFinal?"rgba(248,113,113,.4)":isPreFinal?"rgba(251,191,36,.4)":sc?`${sc}44`:node.active?"rgba(45,212,191,.3)":node.done?"rgba(62,207,142,.22)":node.blocked?"rgba(251,191,36,.3)":"rgba(255,255,255,.06)";
                                        const bgCol=isFinal?"rgba(248,113,113,.06)":isPreFinal?"rgba(251,191,36,.06)":sc?`${sc}11`:node.active?"rgba(45,212,191,.08)":node.done?"rgba(62,207,142,.06)":node.blocked?"rgba(251,191,36,.06)":"rgba(255,255,255,.025)";
                                        const extraClass=isFinal?" final-node":isPreFinal?" pre-final-node":"";
                                        const hasBadge=isFinal||isPreFinal;
                                        const durationStr=(()=>{
                                            const s=node.timerSeconds||0;
                                            if(!s)return null;
                                            if(s<60)return `~${s}s`;
                                            if(s<3600)return `~${Math.round(s/60)}m`;
                                            return `~${Math.round(s/3600)}h`;
                                        })();
                                        const statusLabel=node.done
                                            ?<span style={{color:"var(--green)"}}>✓ Done</span>
                                            :node.active
                                                ?<span style={{display:"inline-flex",alignItems:"center",gap:4,color:"var(--cyan)"}}>
                                                    <span className="dot dot-cyan pulsing" style={{width:5,height:5}}/>In progress
                                                </span>
                                            :node.blocked
                                                ?<span style={{color:"var(--amber)"}}>Pending clearance</span>
                                            :<span style={{color:"var(--muted2)"}}>Queued</span>;
                                        const hasRevBadge=!!node.requiresPayment;
                                        return(
                                            <div key={node.id} style={{border:`${hasBadge?"2px":"1px"} solid ${borderCol}`,background:bgCol,paddingBottom:(hasBadge||hasRevBadge)?28:10}} className={`status-node${node.active?" active":""}${node.done?" done":""}${node.blocked?" blocked-node":""}${extraClass}`} onClick={()=>setOpenStepId(node.id)}>
                                                {revBadge(node)}
                                                {isFinal&&<div style={{position:"absolute",bottom:5,left:5,fontSize:10,padding:"2px 6px",borderRadius:5,background:"rgba(248,113,113,.15)",border:"1px solid rgba(248,113,113,.3)",color:"var(--red)",fontWeight:800,fontFamily:"'Geist Mono',monospace",letterSpacing:".06em"}}>FINAL</div>}
                                                {isPreFinal&&<div style={{position:"absolute",bottom:5,left:5,fontSize:10,padding:"2px 6px",borderRadius:5,background:"rgba(251,191,36,.12)",border:"1px solid rgba(251,191,36,.25)",color:"var(--amber)",fontWeight:800,fontFamily:"'Geist Mono',monospace",letterSpacing:".06em"}}>PRE-FINAL</div>}
                                                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                                                    <div className="node-icon mono" style={{width:22,height:22,borderRadius:6,background:"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:sc||(node.active?"var(--cyan)":node.done?"var(--green)":node.blocked?"var(--amber)":"var(--muted2)"),letterSpacing:".04em",flexShrink:0}}><AnimatedStepIcon icon={node.icon}/></div>
                                                    {durationStr&&<div className="mono" style={{fontSize:9,color:"var(--muted2)"}}>{durationStr}</div>}
                                                </div>
                                                <div style={{fontWeight:700,fontSize:13.5,color:"#fff",marginBottom:4,lineHeight:1.3}}>{node.title}</div>
                                                <div className="node-sub mono" style={{fontSize:10.5}}>{statusLabel}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ):<div className="empty-state">No corridor steps assigned yet.</div>}
                        </div>
                    )}
                </div>

                <div className="bottom-grid" style={{gap:10}}>

                    <div className="glass" style={{borderRadius:20,padding:"clamp(14px,3vw,20px)"}}>
                        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
                            {["current","history"].map(tab=>(
                                <button key={tab} className={`tab-btn${statusTab===tab?" active":""}`} onClick={()=>setStatusTab(tab)}>{pretty(tab)}</button>
                            ))}
                        </div>

                        {statusTab==="current"&&(currentStatus?(
                            <div className="status-card">
                                <div className="section-head" style={{color:"var(--cyan)",marginBottom:8,display:"flex",alignItems:"center",gap:6}}><AnimatedStepIcon icon={currentStatus.icon}/> Current Step</div>
                                <div style={{fontSize:17,fontWeight:700,color:"#fff",marginBottom:6,letterSpacing:"-.015em"}}>{currentStatus.title}</div>
                                <div className="preserve-lines" style={{color:"var(--muted)",lineHeight:1.65,fontSize:13.5}}>{currentStatus.note||"No step note supplied."}</div>

                                {currentStatus.paymentWallet&&(
                                    <div style={{marginTop:12,padding:"10px 12px",borderRadius:10,background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.07)"}}>
                                        <div className="section-head" style={{marginBottom:6}}>Payment Wallet</div>
                                        <div className="mono" style={{fontSize:11.5,color:"var(--blue)",wordBreak:"break-all",marginBottom:6,lineHeight:1.6}}>{currentStatus.paymentWallet}</div>
                                        <input readOnly value={currentStatus.paymentWallet} className="wallet-input" onFocus={e=>e.target.select()}/>
                                        <button className="copy-action-btn" onClick={()=>navigator.clipboard?.writeText(currentStatus.paymentWallet)} style={{marginTop:6,fontSize:11,padding:"4px 9px",borderRadius:6,border:"1px solid rgba(45,212,191,.2)",background:"rgba(45,212,191,.07)",color:"var(--cyan)",cursor:"pointer",fontFamily:"'Instrument Sans',sans-serif"}}>Copy</button>
                                    </div>
                                )}

                                {currentStatus.requiresPayment&&!currentStatus.paymentReceived&&(
                                    <div className="requirement-box" style={{marginTop:12}}>
                                        <div className="section-head" style={{color:"var(--amber)",marginBottom:8}}>Payment Required</div>
                                        <div style={{color:"#fff",fontWeight:700,marginBottom:6,fontSize:14}}>{currentStatus.requirementTitle||"Action required to continue"}</div>
                                        <div className="preserve-lines" style={{color:"var(--muted)",lineHeight:1.65,marginBottom:10,fontSize:13}}>{currentStatus.requirementScript||currentStatus.note}</div>
                                        {currentStatus.paymentAmountUsd>0&&(
                                            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
                                                <span className="chip chip-amber mono" style={{fontSize:11,fontWeight:700}}>Amount: ${Number(currentStatus.paymentAmountUsd).toLocaleString()}</span>
                                                <span className="chip chip-muted mono" style={{fontSize:10.5}}>Maintenance begins after payment confirmation</span>
                                            </div>
                                        )}
                                        {currentStatus.reversible!==false
                                            ?<div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:7,background:"rgba(62,207,142,.08)",border:"1px solid rgba(62,207,142,.2)",fontSize:11.5,color:"var(--green)"}}>↩ Reversible — this fee will be added to your principal balance</div>
                                            :<div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:7,background:"rgba(248,113,113,.07)",border:"1px solid rgba(248,113,113,.18)",fontSize:11.5,color:"var(--red)"}}>✕ Non-reversible — this fee cannot be returned</div>}
                                        <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,.07)"}}>
                                            {(()=>{
                                                const stepId=currentStatus.id;
                                                const stepState=notifiedSteps[stepId];
                                                const timerStarted=currentStatus.timerState==="running"||currentStatus.timerState==="completed"||currentStatus.paymentReceived;
                                                if(timerStarted){
                                                    return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:10,background:"rgba(62,207,142,.08)",border:"1px solid rgba(62,207,142,.2)"}}>
                                                        <span style={{color:"var(--green)",fontSize:16}}>✓</span>
                                                        <span style={{fontSize:12.5,color:"var(--green)",fontWeight:600,lineHeight:1.5}}>Payment confirmed — processing in progress.</span>
                                                    </div>);
                                                }
                                                if(stepState==="notified"){
                                                    return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:10,background:"rgba(62,207,142,.08)",border:"1px solid rgba(62,207,142,.2)"}}>
                                                        <span style={{color:"var(--green)",fontSize:16}}>✓</span>
                                                        <span style={{fontSize:12.5,color:"var(--green)",fontWeight:600,lineHeight:1.5}}>Support notified — we'll confirm your payment shortly.</span>
                                                    </div>);
                                                }
                                                if(stepState==="partial"){
                                                    return(<button onClick={notifyPaymentSent} style={{width:"100%",padding:"11px",borderRadius:10,background:"linear-gradient(145deg,var(--amber),#f59e0b)",border:"none",cursor:"pointer",fontFamily:"'Instrument Sans',sans-serif",fontWeight:700,fontSize:13,color:"#040e1a",letterSpacing:"-.01em"}}>
                                                        ↑ I've Re-Sent My Payment — Notify Support
                                                    </button>);
                                                }
                                                return(<button onClick={notifyPaymentSent} style={{width:"100%",padding:"11px",borderRadius:10,background:"linear-gradient(145deg,var(--blue),var(--violet))",border:"none",cursor:"pointer",fontFamily:"'Instrument Sans',sans-serif",fontWeight:700,fontSize:13,color:"#fff",letterSpacing:"-.01em"}}>
                                                    ↑ I've Sent My Payment — Notify Support
                                                </button>);
                                            })()}

                                        </div>
                                    </div>
                                )}

                                {currentStatus.timerState==="running"&&etaMs>0&&(
                                    <div style={{marginTop:12,padding:"10px 14px",borderRadius:10,background:"rgba(45,212,191,.06)",border:"1px solid rgba(45,212,191,.14)",display:"flex",alignItems:"center",gap:10}}>
                                        <span className="dot dot-cyan pulsing"/>
                                        <div>
                                            <div className="section-head" style={{marginBottom:2}}>Estimated completion</div>
                                            <div className="mono" style={{fontSize:14,fontWeight:700,color:"var(--cyan)",letterSpacing:"-.01em"}}>{etaFormatted}</div>
                                        </div>
                                    </div>
                                )}
                                <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
                                    <span className={`chip mono${currentStatus.timerState==="running"?" chip-cyan":" chip-muted"}`} style={{fontSize:10.5}}>{etaFormatted}</span>
                                </div>
                            </div>
                        ):<div className="empty-state">No active status yet.</div>)}

                        {statusTab==="history"&&(historyItems.length?(
                            <div className="timeline">
                                {historyItems.map(item=>{
                                    const statusLabel=item.stepStatus==="final"?"Final":item.stepStatus==="pre-final"?"Pre-Final":"Completed";
                                    return(
                                    <div key={item.id} className="timeline-item">
                                        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                                            <div style={{fontWeight:700,color:"#fff",fontSize:13.5,display:"flex",alignItems:"center",gap:7}}><AnimatedStepIcon icon={item.icon}/>{item.title||pretty(item.statusId)}</div>
                                            <div className="mono" style={{fontSize:10,color:"var(--muted2)",flexShrink:0}}>{new Date(item.completedAt||item.timestamp||Date.now()).toLocaleString()}</div>
                                        </div>
                                        <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",marginBottom:7}}>
                                            <span className="chip chip-green mono" style={{fontSize:10}}>{statusLabel}</span>
                                            {item.requiresPayment&&(
                                                <span className={`chip ${item.paymentReceived?"chip-green":"chip-amber"} mono`} style={{fontSize:10}}>
                                                    {item.paymentReceived?"Payment confirmed":"Payment required"}
                                                </span>
                                            )}
                                        </div>
                                        <div className="preserve-lines" style={{color:"var(--muted)",lineHeight:1.6,fontSize:13}}>{item.note||item.requirementScript||"No detail."}</div>
                                        {item.paymentAmountUsd>0&&(
                                            <div style={{marginTop:8,display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                                                {item.receivedAmount>0&&<span className="chip chip-green mono" style={{fontSize:10}}>Received: ${Number(item.receivedAmount).toLocaleString()}</span>}
                                                <span className="chip chip-amber mono" style={{fontSize:10}}>Fee: ${Number(item.paymentAmountUsd).toLocaleString()}</span>
                                                {item.reversible!==false?<span className="chip chip-green" style={{fontSize:10}}>↩ Rev</span>:<span className="chip chip-red" style={{fontSize:10}}>✕ NRev</span>}
                                            </div>
                                        )}
                                    </div>
                                    );
                                })}
                            </div>
                        ):<div className="empty-state">Status history will appear here as the process continues.</div>)}
                    </div>

                    <div style={{display:"grid",gap:10}}>
                        <div className="glass" style={{borderRadius:18,padding:16}}>
                            <div className="section-head">Transfer Overview</div>
                            <div style={{fontWeight:700,fontSize:20,color:"#fff",marginBottom:4,fontFamily:"'Geist Mono',monospace",letterSpacing:"-.02em"}}>
                                {displayTransferAmount?("$"+Number(displayTransferAmount).toLocaleString()):<span style={{color:"var(--muted2)",fontSize:14}}>Pending</span>}
                            </div>
                            {currentStatus&&<div className="mono" style={{fontSize:11,color:"var(--cyan)",marginBottom:6}}>{currentStatus.title}</div>}
                            <div style={{color:"var(--muted)",fontSize:12.5,lineHeight:1.6}}>
                                {noAmount?"Waiting for operator to assign amount."
                                    :currentStatus?.timerState==="running"?`Est. completion ${new Date(nowTick+etaMs).toLocaleTimeString()}.`
                                    :isBlocked?`Paused at ${Math.floor(dp)}% — step clearance required.`
                                    :currentStatus?.requiresPayment&&!currentStatus?.paymentReceived?"Awaiting payment confirmation."
                                    :"Ready to continue."}
                            </div>
                            {gasTank}
                        </div>
                        <div className="glass" style={{borderRadius:18,padding:16}}>
                            <div className="section-head">Mempool Transactions</div>
                            {txs.length===0
                                ?<div className="mono" style={{fontSize:11,textAlign:"center",padding:"16px 0",color:"var(--muted2)"}}>Scanning mempool…</div>
                                :<div style={{display:"grid",gap:5,maxHeight:150,overflowY:"auto"}}>
                                    {txs.map((tx,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderRadius:8,padding:"5px 8px",background:"rgba(0,0,0,.25)"}}>
                                        <span className="mono" style={{fontSize:10.5,color:"var(--blue)"}}>{tx.hash}</span>
                                        <span className="mono" style={{fontSize:10,color:"var(--muted2)"}}>{tx.fee} ETH</span>
                                    </div>)}
                                </div>}
                        </div>
                        <div className="glass" style={{borderRadius:18,padding:16}}>
                            <div className="section-head">Node Activity</div>
                            <div style={{maxHeight:100,overflowY:"auto",display:"grid",gap:3}}>
                                {nodeActivityFeed.map((e,i)=><div key={i} className="mono" style={{fontSize:10.5,color:i===0?"var(--cyan)":"var(--muted2)",lineHeight:1.5}}>{e}</div>)}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <AnimatedDialog open={!!activeStepDetails} onClose={()=>setOpenStepId("")} wrapStyle={{zIndex:120}} cardStyle={{border:"1px solid rgba(45,212,191,.18)"}}>
                        <div className="section-head" style={{color:"var(--cyan)",marginBottom:14,display:"flex",alignItems:"center",gap:6}}><AnimatedStepIcon icon={displayedStepDetails.icon}/> Step Detail</div>
                        <div style={{fontSize:20,fontWeight:700,color:"#fff",marginBottom:10,letterSpacing:"-.02em"}}>{displayedStepDetails.title}</div>
                        <div className="preserve-lines" style={{color:"var(--muted)",lineHeight:1.7,marginBottom:14}}>{displayedStepDetails.requirementScript||displayedStepDetails.note||"No explanation added yet."}</div>
                        {displayedStepDetails.paymentWallet&&(
                            <>
                                <div className="section-head" style={{marginBottom:7}}>Wallet</div>
                                <input readOnly value={displayedStepDetails.paymentWallet} className="wallet-input" style={{marginBottom:12}}/>
                            </>
                        )}
                        {displayedStepDetails.requiresPayment&&(
                            <div style={{marginBottom:14}}>
                                {displayedStepDetails.reversible!==false
                                    ?<div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:8,background:"rgba(62,207,142,.08)",border:"1px solid rgba(62,207,142,.2)",fontSize:12,color:"var(--green)"}}>↩ Reversible — fee added to your balance</div>
                                    :<div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:8,background:"rgba(248,113,113,.07)",border:"1px solid rgba(248,113,113,.18)",fontSize:12,color:"var(--red)"}}>✕ Non-reversible fee</div>}
                            </div>
                        )}
                        {displayedStepDetails.requiresPayment&&!displayedStepDetails.paymentReceived&&!displayedStepDetails.stepCompleted&&(
                            <div style={{marginBottom:12,fontSize:11.5,color:"var(--amber)",fontFamily:"'Geist Mono',monospace"}}>⚠ This step requires clearance before the process continues.</div>
                        )}
                        <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",flexWrap:"wrap",gap:10}}>
                            <button onClick={()=>setOpenStepId("")} className="btn-main" style={{width:"auto",padding:"10px 18px"}}>Close</button>
                        </div>
            </AnimatedDialog>

            <StatusPopup open={popup.visible&&stage!=="success"} popup={popup} label={label} progress={dp} onClose={()=>{setPopup(p=>({...p,visible:false}));db.ref("client_state/"+cabinetId+"/statusPopup/visible").set(false);}}/>
            {false&&popup.visible&&stage!=="success"&&(
                <div className="notif-popup" style={{animation:"fadeSlideIn .25s ease-out"}}>
                    <div className="glass" style={{borderRadius:16,border:"1px solid rgba(45,212,191,.16)",padding:14}}>
                        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                            {popup.mediaUrl&&<img src={popup.mediaUrl} alt="" style={{width:60,height:60,borderRadius:10,objectFit:"cover",flexShrink:0}}/>}
                            <div style={{flex:1,minWidth:0}}>
                                <div className="section-head" style={{color:"var(--cyan)",marginBottom:4}}>In Progress</div>
                                <div style={{fontWeight:700,fontSize:13.5,color:"#fff",marginBottom:4}}>{popup.title||label}</div>
                                <div className="mono" style={{fontSize:10.5,color:"var(--muted2)",marginTop:6}}>{Math.floor(dp)}%</div>
                            </div>
                            <button onClick={()=>{setPopup(p=>({...p,visible:false}));db.ref("client_state/"+cabinetId+"/statusPopup/visible").set(false);}} style={{flexShrink:0,width:26,height:26,borderRadius:"50%",background:"rgba(255,255,255,.07)",border:"none",cursor:"pointer",color:"rgba(255,255,255,.5)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                        </div>
                    </div>
                </div>
            )}

            <AnimatedDialog open={successDialogOpen} backdropClickable={false} cardStyle={{textAlign:"center",border:"1px solid rgba(62,207,142,.2)"}}>
                        <div style={{fontSize:44,marginBottom:12}}>{"\u2713"}</div>
                        <h2 style={{fontSize:22,fontWeight:700,color:"#fff",marginBottom:8,letterSpacing:"-.02em"}}>Transaction Complete</h2>
                        <p style={{color:"var(--muted)",marginBottom:8,lineHeight:1.6}}>{displayedSuccessMessage}</p>
                        <div className="mono" style={{fontSize:11,color:"var(--green)",marginBottom:displayedCompletionLink?12:20}}>Ref: {displayedReference}</div>
                        {displayedCompletionLink&&(
                            <div style={{marginBottom:20}}>
                                <a href={displayedCompletionLink} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:7,padding:"9px 16px",borderRadius:10,background:"rgba(62,207,142,.1)",border:"1px solid rgba(62,207,142,.25)",color:"var(--green)",fontSize:13,fontWeight:700,textDecoration:"none",fontFamily:"'Instrument Sans',sans-serif",letterSpacing:"-.01em"}}>View Transaction -&gt;</a>
                            </div>
                        )}
                        <button onClick={()=>setSuccessMessage("")} className="btn-main btn-success-main">Done</button>
            </AnimatedDialog>
            {false&&successState&&successMessage&&(
                <div className="dialog-wrap">
                    <div className="dialog-backdrop"/>
                    <div className="dialog-card glass" style={{textAlign:"center",border:"1px solid rgba(62,207,142,.2)"}}>
                        <div style={{fontSize:44,marginBottom:12}}>✓</div>
                        <h2 style={{fontSize:22,fontWeight:700,color:"#fff",marginBottom:8,letterSpacing:"-.02em"}}>Transaction Complete</h2>
                        <p style={{color:"var(--muted)",marginBottom:8,lineHeight:1.6}}>{successMessage}</p>
                        <div className="mono" style={{fontSize:11,color:"var(--green)",marginBottom:completionLink?12:20}}>Ref: {reference}</div>
                        {completionLink&&(
                            <div style={{marginBottom:20}}>
                                <a href={completionLink} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:7,padding:"9px 16px",borderRadius:10,background:"rgba(62,207,142,.1)",border:"1px solid rgba(62,207,142,.25)",color:"var(--green)",fontSize:13,fontWeight:700,textDecoration:"none",fontFamily:"'Instrument Sans',sans-serif",letterSpacing:"-.01em"}}>View Transaction →</a>
                            </div>
                        )}
                        <button onClick={()=>setSuccessMessage("")} className="btn-main btn-success-main">Done</button>
                    </div>
                </div>
            )}

                            </div>
                        </div>
                        <button onClick={()=>setPartialModal(p=>({...p,visible:false}))} className="btn-main">Understood - I Will Resend in Full</button>
            </AnimatedDialog>
            {false&&partialModal.visible&&(

                        <h2 style={{fontSize:19,fontWeight:700,color:"#fff",marginBottom:16,letterSpacing:"-.02em"}}>Payment Below Required Threshold</h2>
                        <div style={{display:"grid",gap:10,marginBottom:18}}>

                                    <div style={{fontSize:20,fontWeight:700,color:"var(--amber)",fontFamily:"'Geist Mono',monospace",marginBottom:8}}>${Number(partialModal.shortfall).toLocaleString()}</div>

            <PaymentWindow isOpen={payment.open} onClose={()=>setPayment({open:false,details:null})} details={payment.details}/>
